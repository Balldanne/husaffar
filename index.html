.fi{display:flex;flex-direction:column;gap:2px}.fi label{font-size:9px;color:var(--fg2);display:flex;align-items:center;gap:3px}.fi input,.fi textarea,.fi select{height:28px;border-radius:7px;border:1px solid var(--border);padding:0 7px;font-size:11px;font-family:var(--m);background:var(--card);color:var(--fg)}.fi input:focus,.fi textarea:focus{outline:none;border-color:var(--coral);box-shadow:0 0 0 2px rgba(194,83,46,.12)}.fi textarea{height:50px;padding:5px 7px;font-family:var(--f);resize:vertical}

/* URL list */
.url-list{margin-top:6px}.url-item{display:flex;gap:4px;align-items:center;margin-bottom:4px}.url-item input{flex:1}.url-item select{width:80px;height:28px;border-radius:7px;border:1px solid var(--border);font-size:10px;background:var(--card);color:var(--fg)}.url-item a{font-size:10px;color:var(--blue);text-decoration:none}

.empty{text-align:center;padding:30px 16px;color:var(--fg2)}
hr{border:none;border-top:1px solid var(--border);margin:10px 0}
.hidden{display:none}.mt6{margin-top:6px}.mt8{margin-top:8px}
.flex{display:flex}.aic{align-items:center}.jcb{justify-content:space-between}.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:14px;text-align:center;padding:20px}

<script>
// === FIREBASE ===
firebase.initializeApp({apiKey:"AIzaSyDmQKsqqai1DKB2sJ4F0hIbX1EbknLNpA4",authDomain:"hus-och-budget.firebaseapp.com",databaseURL:"https://hus-och-budget-default-rtdb.europe-west1.firebasedatabase.app",projectId:"hus-och-budget",storageBucket:"hus-och-budget.firebasestorage.app",messagingSenderId:"1019610713349",appId:"1:1019610713349:web:26c9ec60dfd8009c1b3b6c"});
var db=firebase.database();

// === UTILS ===
function N(v){var n=Number(v);return isNaN(n)?0:n}
function dc(o){return JSON.parse(JSON.stringify(o))}
function fSEK(v){v=N(v);return Math.abs(v)>=1e6?(v/1e6).toFixed(2)+" mkr":Math.round(v).toLocaleString("sv-SE")+" kr"}
function fN(v){return Math.round(N(v)).toLocaleString("sv-SE")}
function fP(v,d){return(N(v)*100).toFixed(d||1)+"%"}
function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2500)}
function srcDot(type){return '<span class="src src-'+type+'" title="'+(type==="auth"?"Myndighetsdata":type==="listing"?"Annonsdata":type==="user"?"Egen input":"Schablon")+'"></span>'}

// === TAX ===
var PBB=58800;
function grundavdrag(i){if(i<=0)return 0;if(i<=.99*PBB)return Math.round(.423*PBB);if(i<=2.72*PBB)return Math.round(.423*PBB+.2*(i-.99*PBB));if(i<=3.41*PBB)return Math.round(.77*PBB);if(i<=8.08*PBB)return Math.round(.77*PBB-.1*(i-3.41*PBB));return Math.max(Math.round(.293*PBB),17400)}
function jsaCalc(i,k){if(i<=0)return 0;if(i<=.91*PBB)return Math.round(k*i);if(i<=3.24*PBB)return Math.round(k*.91*PBB+.332*(i-.91*PBB));if(i<=8.08*PBB)return Math.round(k*.91*PBB+.332*(3.24-.91)*PBB);if(i<=13.54*PBB)return Math.round(Math.max(0,k*.91*PBB+.332*(3.24-.91)*PBB-.03*(i-8.08*PBB)));return Math.round(Math.max(0,k*.91*PBB+.332*(3.24-.91)*PBB-.03*(13.54-8.08)*PBB))}
function ptax(gm,by,cfg,intDed){var b=N(gm)*12+N(by),g=grundavdrag(b),be=Math.max(0,b-g),sg=643000;var ks=Math.round(be*N(cfg.ks)),ss=be>sg?Math.round((be-sg)*.2):0;var pa=Math.round(Math.min(b,590700)*.07),ka=cfg.ch?Math.round(be*N(cfg.ka)):0;var bg=Math.round(be*.00293),ps=Math.min(Math.round(be*.01),1349);var tot=ks+ss+pa+ka+bg+ps;var rk=0,id=N(intDed);if(id>0)rk=id<=1e5?Math.round(id*.3):Math.round(1e5*.3+(id-1e5)*.21);var rd=jsaCalc(b,N(cfg.ks))+pa+1500+rk,sl=Math.max(0,tot-rd);var mg=b>(sg+g)?N(cfg.ks)+.2:N(cfg.ks);return{n:Math.round((b-sl)/12),br:Math.round(b/12),sl:sl,ss:ss,ka:ka,mg:Math.round(mg*1e3)/1e3}}
function barnbidrag(nc){var t={0:0,1:1250,2:2650,3:4480,4:6740,5:9240,6:11740};nc=N(nc);return nc<=0?0:nc in t?t[nc]:11740+(nc-6)*2500}

// === BUDGET ===
function calcBudgetTotal(f){var t=0;(f.budget_shared||[]).forEach(function(i){t+=N(i.amount)});f.persons.forEach(function(p){(p.personal_budget||[]).forEach(function(i){t+=N(i.amount)})});return t}
function calcPersonBudget(p){var t=0;(p.personal_budget||[]).forEach(function(i){t+=N(i.amount)});return t}

// === DATA QUALITY ===
function calcDataQuality(p){
  var dd=p.dd||{};
  var fields=[
    {k:"byggar",w:3,src:dd._src_byggar||""},
    {k:"boarea",w:3,src:dd._src_boarea||""},
    {k:"tomtarea",w:2,src:dd._src_tomtarea||""},
    {k:"energiklass",w:3,src:dd._src_energiklass||""},
    {k:"uppvarmning",w:2,src:dd._src_uppvarmning||""},
    {k:"taxvarde",w:3,src:dd._src_taxvarde||""},
    {k:"rum",w:1,src:dd._src_rum||""},
    {k:"tak_ar",w:2,src:dd._src_tak_ar||""},
    {k:"vp_ar",w:1,src:dd._src_vp_ar||""},
    {k:"badrum_ar",w:1,src:dd._src_badrum_ar||""},
  ];
  var totalW=0,scoredW=0;
  fields.forEach(function(f){
    totalW+=f.w;
    if(dd[f.k]){
      var srcMult=f.src==="auth"?1:f.src==="listing"?0.85:f.src==="user"?0.7:0.5;
      scoredW+=f.w*srcMult;
    }
  });
  // URLs bonus
  if((p.urls||[]).length>0)scoredW+=1;
  totalW+=1;
  // Notes bonus
  if(dd.visning_notes)scoredW+=0.5;totalW+=0.5;
  var pct=totalW>0?Math.round(scoredW/totalW*100):0;
  return Math.min(100,pct);
}

// === PROSPECT CALC ===
function calcP(f,p){
  var aptSale=N(f.curr_value)||10000000,currMtg=N(f.curr_mortgage)||5416460;
  var bba=barnbidrag(f.children),sc=aptSale-aptSale*0.02-currMtg;
  var rep=Math.min(N(p.parent_repay),N(p.parent_loan)),eq=sc-rep;
  var ta=N(p.price)+N(p.reno),nm=Math.max(0,ta-eq);
  var er=N(f.rate)||0.022;if(er<=0)er=0.022;
  var im=Math.round(nm*er/12),yi=nm*er;
  var gi=f.persons.reduce(function(s,pe){return s+N(pe.gm)*12+N(pe.by)},0);
  var ltv=N(p.price)>0?nm/N(p.price):0;
  var dti=gi>0?Math.round((nm+N(p.parent_loan)-rep)/gi*10)/10:0;
  var ar=0;if(ltv>0.7)ar=0.02;else if(ltv>0.5)ar=0.01;
  var am=Math.round(nm*ar/12);
  var d=p.drift||{},dt=0;for(var k in d){if(k[0]!=="_")dt+=N(d[k])}
  var op=im+dt,th=op+am;
  var fks=N(f.ks)||0.326,fka=N(f.ka)||0.0085;
  var taxes=f.persons.map(function(pe,i){var sh=pe.intShare!==undefined?N(pe.intShare):(i===0?1:0);return ptax(pe.gm,pe.by,{ks:fks,ka:fka,ch:pe.church},yi*sh)});
  var fd=taxes.reduce(function(s,t){return s+t.n},0)+bba;
  var bu=calcBudgetTotal(f);
  var lf=Math.round(N(p.price)*0.015)+825,npb=Math.max(0,nm-N(p.pantbrev)),pb=npb>0?Math.round(npb*0.02)+375:0;
  var surplus=fd-th-bu;
  // Max price (surplus = 0)
  var maxPrice=N(p.price);if(surplus>0&&N(p.price)>0){var step=100000;for(var mp=N(p.price);mp<N(p.price)+5000000;mp+=step){var tnm=Math.max(0,mp+N(p.reno)-eq);var tim=Math.round(tnm*er/12);var tar=tnm/(mp||1)>0.7?0.02:tnm/(mp||1)>0.5?0.01:0;var tam=Math.round(tnm*tar/12);if(fd-(tim+dt+tam)-bu<=0){maxPrice=mp-step;break}}if(maxPrice===N(p.price))maxPrice=N(p.price)+5000000}
  var comfortPrice=maxPrice;for(var cp=N(p.price);cp<=maxPrice;cp+=100000){var cnm=Math.max(0,cp+N(p.reno)-eq);var cim=Math.round(cnm*er/12);var car=cnm/(cp||1)>0.7?0.02:cnm/(cp||1)>0.5?0.01:0;var cam=Math.round(cnm*car/12);if(fd-(cim+dt+cam)-bu<=5000){comfortPrice=cp-100000;break}}
  // Risk
  var risks=[],rs=0,dd=p.dd||{},yr=new Date().getFullYear();
  if(ltv>0.85){risks.push({t:"Hög belåningsgrad "+(ltv*100).toFixed(0)+"%",d:"Svårt att få lån",l:"high"});rs+=3}
  else if(ltv>0.7){risks.push({t:"LTV "+(ltv*100).toFixed(0)+"%",d:"2% amorteringskrav",l:"med"});rs+=1}
  if(dti>4.5){risks.push({t:"Skuldkvot "+dti+"x",d:"Kan kräva extra amortering",l:"high"});rs+=2}
  else if(dti>3.5){risks.push({t:"Skuldkvot "+dti+"x",d:"Förhöjd",l:"med"});rs+=1}
  if(N(dd.byggar)&&N(dd.byggar)<1980){risks.push({t:"Byggt "+dd.byggar,d:"Räkna med underhåll",l:"med"});rs+=1}
  if(dd.energiklass&&"EFG".indexOf(dd.energiklass)>=0){risks.push({t:"Energiklass "+dd.energiklass,d:"Höga driftkostnader",l:"med"});rs+=1}
  if(N(dd.tak_ar)&&(yr-N(dd.tak_ar))>25){risks.push({t:"Tak "+(yr-N(dd.tak_ar))+" år",d:"Livslängd 30-40 år",l:"med"});rs+=1}
  if(N(dd.vp_ar)&&(yr-N(dd.vp_ar))>15){risks.push({t:"VP "+(yr-N(dd.vp_ar))+" år",d:"Byte 80-150k",l:"med"});rs+=1}
  if(surplus<0){risks.push({t:"Negativt överskott",d:fSEK(surplus)+"/mån",l:"high"});rs+=3}
  else if(surplus<5000){risks.push({t:"Tight marginal",d:fSEK(surplus)+"/mån",l:"med"});rs+=1}
  var s5=calcSR(f,p,0.05),s7=calcSR(f,p,0.07);
  if(s5<0){risks.push({t:"Klarar ej 5% ränta",d:fSEK(s5)+"/mån",l:"high"});rs+=2}
  if(!risks.length)risks.push({t:"Inga större risker",d:"God marginal",l:"low"});
  var rl=rs>=4?"high":rs>=2?"med":"low";
  var missing=[];
  if(!dd.byggar)missing.push("Byggår");if(!dd.energiklass)missing.push("Energiklass");if(!dd.boarea)missing.push("Boarea");if(!dd.taxvarde)missing.push("Taxeringsvärde");if(!dd.uppvarmning)missing.push("Uppvärmning");
  var dq=calcDataQuality(p);
  return{name:p.name,price:N(p.price),reno:N(p.reno),mortgage:nm,rate:er,intMonth:im,amortRate:ar,amortMonth:am,drift:dt,opCost:op,totalHousing:th,disp:fd,bb:bba,ltv:ltv,dti:dti,surplus:surplus,lagfart:lf,pantbrev:pb,txCost:lf+pb,equity:eq,risks:risks,riskLevel:rl,missing:missing,budget:bu,s5:s5,s7:s7,taxes:taxes,gross:gi,maxPrice:maxPrice,comfortPrice:comfortPrice,dataQuality:dq}
}

function updateCharts(){for(var k in S.charts){try{S.charts[k].destroy()}catch(e){}}S.charts={};if(S.tab!=="dash"||!S.prospects.length)return;
  var f=S.family,c=calcFamily(f),rs=S.prospects.map(function(p){return calcP(f,p)}),currH=c.housing;
  var tc=S.dark?"#9C9588":"#6B6358",gc=S.dark?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)",C={coral:"#C2532E",amber:"#D4890F",teal:"#1A8A65",purple:"#6B4DAA",blue:"#2E78B7"};
  var bEl=document.getElementById("dBar");
  if(bEl){var labels=[(f.curr_addr||"Nuv.")];rs.forEach(function(r){labels.push((r.name||"?").slice(0,12))});
    S.charts.bar=new Chart(bEl,{type:"bar",data:{labels:labels,datasets:[{label:"Ränta",data:[N(f.curr_int)].concat(rs.map(function(r){return r.intMonth})),backgroundColor:C.coral},{label:"Drift",data:[N(f.curr_brf)+N(f.curr_garage)].concat(rs.map(function(r){return r.drift})),backgroundColor:C.teal},{label:"Amort.",data:[N(f.curr_amort)].concat(rs.map(function(r){return r.amortMonth})),backgroundColor:C.amber,borderRadius:{topLeft:3,topRight:3}}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:9},color:tc}}},scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:9},color:tc}},y:{stacked:true,grid:{color:gc},ticks:{font:{size:9},color:tc,callback:function(v){return Math.round(v/1000)+"k"}},border:{display:false}}}}})}
  var sEl=document.getElementById("dStress");
  if(sEl){var rates=[0.02,0.025,0.03,0.035,0.04,0.05,0.06,0.07],cols=[C.coral,C.teal,C.blue,C.purple,C.amber];
    S.charts.str=new Chart(sEl,{type:"line",data:{labels:rates.map(function(r){return(r*100).toFixed(1)+"%"}),datasets:rs.map(function(r,j){return{label:(r.name||"?").slice(0,12),data:rates.map(function(rate){return Math.round(calcSR(f,S.prospects[j],rate))}),borderColor:cols[j%5],backgroundColor:cols[j%5]+"18",fill:true,tension:0.3,pointRadius:2,borderWidth:2}})},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:9},color:tc}}},scales:{x:{grid:{display:false},ticks:{font:{size:9},color:tc}},y:{grid:{color:gc},ticks:{font:{size:9},color:tc,callback:function(v){var a=Math.abs(v);return(v<0?"−":"")+(a>=1000?Math.round(a/1000)+"k":a)}},border:{display:false}}}}})}
}

var saved=localStorage.getItem("hid");if(saved){S.hid=saved;connect(saved)}else render();
</script>
</body>
</html>
