<style>

.tabs{display:flex;gap:2px;background:var(--bg2);padding:3px;border-radius:var(--r);margin:10px 0}.tab{flex:1;text-align:center;padding:7px 4px;font-size:11px;font-weight:500;border-radius:8px;cursor:pointer;color:var(--fg2);border:none;background:none;font-family:var(--f);transition:.15s}.tab.a{background:var(--card);color:var(--fg);box-shadow:0 1px 3px rgba(0,0,0,.06)}

.fg{display:grid;gap:8px}.fg2{grid-template-columns:1fr 1fr}.fg3{grid-template-columns:1fr 1fr 1fr}.fg4{grid-template-columns:1fr 1fr 1fr 1fr}@media(max-width:640px){.fg3,.fg4{grid-template-columns:1fr 1fr}}
.fi{display:flex;flex-direction:column;gap:2px}.fi label{font-size:9px;color:var(--fg2);display:flex;align-items:center;gap:3px}.fi input,.fi select,.fi textarea{height:28px;border-radius:7px;border:1px solid var(--border);padding:0 7px;font-size:11px;font-family:var(--m);background:var(--card);color:var(--fg)}.fi input:focus,.fi textarea:focus{outline:none;border-color:var(--coral);box-shadow:0 0 0 2px rgba(194,83,46,.12)}.fi textarea{height:60px;padding:6px 7px;font-family:var(--f);resize:vertical}
.sr{display:flex;align-items:center;gap:8px;padding:4px 0}.sr label{font-size:10px;color:var(--fg2);min-width:90px;flex-shrink:0}.sr input[type=range]{flex:1;accent-color:var(--coral);height:5px}.sr .sv{font-size:11px;font-family:var(--m);font-weight:500;min-width:70px;text-align:right}

.pr{display:flex;justify-content:space-between;padding:3px 0;font-size:11px}.pr+.pr{border-top:1px solid var(--border)}.pr span{color:var(--fg2)}.pr b{font-family:var(--m);font-weight:500}
.badge{display:inline-flex;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:600}

hr{border:none;border-top:1px solid var(--border);margin:10px 0}
.hidden{display:none}.mt6{margin-top:6px}.mt8{margin-top:8px}.mt10{margin-top:10px}
.flex{display:flex}.aic{align-items:center}.jcb{justify-content:space-between}.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}

.login h2{font-size:18px;font-weight:600}.login p{font-size:12px;color:var(--fg2);max-width:340px}
.login input{width:100%;max-width:280px;height:38px;border-radius:10px;border:1px solid var(--border);padding:0 12px;font-size:13px;font-family:var(--m);text-align:center;background:var(--card);color:var(--fg)}
.login input:focus{outline:none;border-color:var(--coral);box-shadow:0 0 0 3px rgba(194,83,46,.15)}
@media(max-width:640px){.hpills .pill:first-child{display:none}}
.cost-bar{background:var(--bg2);border-radius:8px;padding:8px 10px;margin-top:8px}
.bar-t{height:4px;border-radius:2px;background:var(--border);overflow:hidden}.bar-f{height:100%;border-radius:2px;transition:width .3s}
.cks{display:flex;flex-wrap:wrap;gap:3px 6px;margin-top:4px}.ck{font-size:9px;display:flex;align-items:center;gap:2px;color:var(--fg2)}.dt{width:5px;height:5px;border-radius:50%}.dt-ok{background:var(--teal)}.dt-no{background:var(--border)}
.risk-card{border-left:3px solid;border-radius:0;padding:8px 12px;margin:4px 0;background:var(--bg2)}.risk-card.low{border-color:var(--teal)}.risk-card.med{border-color:var(--amber)}.risk-card.high{border-color:var(--rose)}
.quest{background:var(--amberL);border-radius:8px;padding:8px 10px;margin-top:8px;font-size:11px;color:var(--amber)}
</style>

<body>
<div id="app"></div>
<script>
const FC={apiKey:"AIzaSyDmQKsqqai1DKB2sJ4F0hIbX1EbknLNpA4",authDomain:"hus-och-budget.firebaseapp.com",databaseURL:"https://hus-och-budget-default-rtdb.europe-west1.firebasedatabase.app",projectId:"hus-och-budget",storageBucket:"hus-och-budget.firebasestorage.app",messagingSenderId:"1019610713349",appId:"1:1019610713349:web:26c9ec60dfd8009c1b3b6c"};
firebase.initializeApp(FC);const db=firebase.database();

// TAX
const PBB=58800;
function ga(i){if(i<=0)return 0;if(i<=.99*PBB)return Math.round(.423*PBB);if(i<=2.72*PBB)return Math.round(.423*PBB+.2*(i-.99*PBB));if(i<=3.41*PBB)return Math.round(.77*PBB);if(i<=8.08*PBB)return Math.round(.77*PBB-.1*(i-3.41*PBB));return Math.max(Math.round(.293*PBB),17400)}
function jsa(i,k){if(i<=0)return 0;if(i<=.91*PBB)return Math.round(k*i);if(i<=3.24*PBB)return Math.round(k*.91*PBB+.332*(i-.91*PBB));if(i<=8.08*PBB)return Math.round(k*.91*PBB+.332*(3.24-.91)*PBB);if(i<=13.54*PBB)return Math.round(Math.max(0,k*.91*PBB+.332*(3.24-.91)*PBB-.03*(i-8.08*PBB)));return Math.round(Math.max(0,k*.91*PBB+.332*(3.24-.91)*PBB-.03*(13.54-8.08)*PBB))}
function ptax(gm,by,c,id=0){const b=gm*12+by,g=ga(b),be=Math.max(0,b-g),sg=643000,ks=Math.round(be*c.ks),ss=be>sg?Math.round((be-sg)*.2):0,pa=Math.round(Math.min(b,590700)*.07),ka=c.ch?Math.round(be*c.ka):0,bg=Math.round(be*.00293),ps=Math.min(Math.round(be*.01),1349),tot=ks+ss+pa+ka+bg+ps;let rk=0;if(id>0)rk=id<=1e5?Math.round(id*.3):Math.round(1e5*.3+(id-1e5)*.21);const rd=jsa(b,c.ks)+pa+1500+rk,sl=Math.max(0,tot-rd),mg=b>(sg+g)?c.ks+.2:c.ks;return{n:Math.round((b-sl)/12),br:Math.round(b/12),sl,ks,ss,ka,mg:Math.round(mg*1e3)/1e3}}
function bb(n){const t={0:0,1:1250,2:2650,3:4480,4:6740,5:9240,6:11740};return n<=0?0:n in t?t[n]:11740+(n-6)*2500}

function calcProspect(f,p){
  const bba=bb(f.children),sc=p.apt_sale-p.apt_sale*p.apt_cost-.mortgage_exist_val(f),rep=Math.min(p.parent_repay,p.parent_loan),eq=sc-rep;
  const ta=p.price+p.reno,nm=Math.max(0,ta-eq),er=p.rate_ov!==null?p.rate_ov:f.rate;
  const im=Math.round(nm*er/12),yi=nm*er;
  const gi=f.persons.reduce((s,pe)=>s+pe.gm*12+pe.by,0);
  const ltv=p.price>0?nm/p.price:0,dti=gi>0?(nm+p.parent_loan-rep)/gi:0;
  let ar=ltv>.7?.02:ltv>.5?.01:0;
  const ea=p.amort_ov!==null?p.amort_ov:ar,am=Math.round(nm*ea/12);
  const d=p.drift,dt=Object.values(d).reduce((s,v)=>s+v,0);
  const op=im+dt,th=op+am;
  const taxes=f.persons.map((pe,i)=>{const sh=pe.intShare??((i===0)?1:0);return ptax(pe.gm,pe.by,{ks:f.ks,ka:f.ka,ch:pe.church},yi*sh)});
  const fd=taxes.reduce((s,t)=>s+t.n,0)+bba;
  const bu=Object.values(f.budget).reduce((s,v)=>s+v,0);
  const lf=Math.round(p.price*.015)+825,npb=Math.max(0,nm-(p.pantbrev||0)),pb=npb>0?Math.round(npb*.02)+375:0;
  const surplus=fd-th-bu;
  // Risk score
  const risks=[];let riskScore=0;
  if(ltv>.85){risks.push({t:"Hög belåningsgrad",d:`${(ltv*100).toFixed(0)}% — svårt att få lån`,l:"high"});riskScore+=3}
  else if(ltv>.7){risks.push({t:"Belåningsgrad >70%",d:`${(ltv*100).toFixed(0)}% — 2% amorteringskrav`,l:"med"});riskScore+=1}
  if(dti>4.5){risks.push({t:"Hög skuldkvot",d:`${dti.toFixed(1)}x — extra amortering kan krävas`,l:"high"});riskScore+=2}
  else if(dti>3.5){risks.push({t:"Förhöjd skuldkvot",d:`${dti.toFixed(1)}x`,l:"med"});riskScore+=1}
  if(p.dd.byggar&&p.dd.byggar<1980){risks.push({t:"Äldre hus",d:`Byggt ${p.dd.byggar} — räkna med underhåll`,l:"med"});riskScore+=1}
  if(p.dd.energiklass&&"EFG".includes(p.dd.energiklass)){risks.push({t:"Dålig energiklass",d:`Klass ${p.dd.energiklass} — höga driftkostnader`,l:"med"});riskScore+=1}
  if(surplus<0){risks.push({t:"Negativt överskott",d:`${fSEK(surplus)}/mån — inte hållbart`,l:"high"});riskScore+=3}
  else if(surplus<5000){risks.push({t:"Tight marginal",d:`Bara ${fSEK(surplus)}/mån kvar`,l:"med"});riskScore+=1}
  // Stress
  const s5=calcSurplusAtRate(f,p,.05),s7=calcSurplusAtRate(f,p,.07);
  if(s5<0){risks.push({t:"Klarar inte 5% ränta",d:`Överskott ${fSEK(s5)}/mån vid 5%`,l:"high"});riskScore+=2}
  if(risks.length===0)risks.push({t:"Inga större risker identifierade",d:"God marginal och rimlig belåning",l:"low"});
  const riskLevel=riskScore>=4?"high":riskScore>=2?"med":"low";
  // Missing data
  const missing=[];
  if(!p.dd.byggar)missing.push("Byggår");if(!p.dd.energiklass)missing.push("Energiklass");if(!p.dd.tomtarea)missing.push("Tomtarea");if(!p.dd.uppvarmning)missing.push("Uppvärmningstyp");if(!p.dd.taxvarde)missing.push("Taxeringsvärde");
  return{name:p.name,price:p.price,reno:p.reno,mortgage:nm,rate:er,intMonth:im,amortRate:ea,amortMonth:am,drift:dt,driftItems:d,opCost:op,totalHousing:th,disp:fd,bb:bba,ltv,dti,surplus,lagfart:lf,pantbrev:pb,txCost:lf+pb,equity:eq,parentRem:p.parent_loan-rep,risks,riskLevel,riskScore,missing,taxes,gross:gi,budget:bu,s5,s7}
}
function calcSurplusAtRate(f,p,rate){
  const bba=bb(f.children),sc=p.apt_sale-p.apt_sale*p.apt_cost-mortgage_exist_val(f),rep=Math.min(p.parent_repay,p.parent_loan),eq=sc-rep;
  const nm=Math.max(0,p.price+p.reno-eq),im=Math.round(nm*rate/12);
  const ltv=p.price>0?nm/p.price:0;let ar=ltv>.7?.02:ltv>.5?.01:0;
  const am=Math.round(nm*ar/12),dt=Object.values(p.drift).reduce((s,v)=>s+v,0);
  const taxes=f.persons.map((pe,i)=>ptax(pe.gm,pe.by,{ks:f.ks,ka:f.ka,ch:pe.church},nm*rate*(pe.intShare??((i===0)?1:0))));
  const fd=taxes.reduce((s,t)=>s+t.n,0)+bba;
  return fd-(im+dt+am)-Object.values(f.budget).reduce((s,v)=>s+v,0);
}
function mortgage_exist_val(f){return f.curr_mortgage||5416460}

// FORMAT
const fSEK=v=>Math.abs(v)>=1e6?`${(v/1e6).toFixed(2)} mkr`:`${Math.round(v).toLocaleString("sv-SE")} kr`;
const fN=v=>Math.round(v).toLocaleString("sv-SE");const fP=(v,d=1)=>`${(v*100).toFixed(d)}%`;

// DEFAULTS
const FDEF={persons:[{name:"Daniel",gm:77500,by:77500,church:true,intShare:1},{name:"Malin",gm:41100,by:0,church:true,intShare:0}],ks:.326,ka:.0085,rate:.022,children:2,
curr_int:10100,curr_amort:5400,curr_brf:12307,curr_garage:1250,curr_mortgage:5416460,curr_value:10000000,curr_addr:"",
budget:{mat:9000,hushall:3000,transport:5000,forskola:2620,klader:2500,nojen:3000,forsakring:2500,abo:2000,spar:5000,ovrigt:3000}};
const PDEF={name:"",addr:"",notes:"",status:"intressant",apt_sale:10000000,apt_cost:.02,parent_loan:1200000,parent_repay:1200000,price:0,reno:0,
drift:{heat:2000,el:1500,water:500,waste:300,ins:500,tax:869,garden:500,other:0},rate_ov:null,amort_ov:null,pantbrev:0,
dd:{byggar:null,energiklass:"",boarea:null,tomtarea:null,uppvarmning:"",taxvarde:null,rum:null,hustyp:"",beskrivning:"",visning_notes:"",maklare_fragor:""}};
const DRIFT_L={heat:"Uppvärmning",el:"El",water:"Vatten/avlopp",waste:"Sopor",ins:"Försäkring",tax:"Fastighetsavg.",garden:"Tomt",other:"Övrigt"};
const BUD_L={mat:"Mat",hushall:"Hushåll",transport:"Transport",forskola:"Förskola",klader:"Kläder",nojen:"Nöjen",forsakring:"Försäkring",abo:"Abonnemang",spar:"Sparande",ovrigt:"Övrigt"};
const STATUS_L={intressant:"Intressant",visning:"Visning bokad",budgivning:"Budgivning",avvakta:"Avvakta",avslag:"Avslag"};
const STATUS_C={intressant:"b-blue",visning:"b-teal",budgivning:"b-amber",avvakta:"b-purple",avslag:"b-red"};

// STATE
let S={screen:"login",dark:false,hid:"",family:JSON.parse(JSON.stringify(FDEF)),prospects:[],tab:"dash",familyOpen:false,currentOpen:false,editIdx:null,viewIdx:null,charts:{}};
let dbRef=null,skipSync=false;
function ss(p){Object.assign(S,p);render();if(S.screen==="app"&&dbRef&&!skipSync)dbRef.set({family:S.family,prospects:S.prospects})}
function dc(o){return JSON.parse(JSON.stringify(o))}

// FIREBASE
function connect(id){
  dbRef=db.ref("households/"+id);
  dbRef.on("value",snap=>{const d=snap.val();if(!d)return;skipSync=true;
    if(d.family)S.family={...FDEF,...d.family,persons:d.family.persons||FDEF.persons,budget:d.family.budget?{...FDEF.budget,...d.family.budget}:FDEF.budget};
    if(d.prospects)S.prospects=d.prospects;S.screen="app";skipSync=false;render();setTimeout(updateCharts,80)});
  dbRef.once("value",snap=>{if(!snap.val())dbRef.set({family:S.family,prospects:[]})});
  S.screen="app";localStorage.setItem("hid",id);render()
}
const saved=localStorage.getItem("hid");

// RENDER
function render(){
  const a=document.getElementById("app");a.className=S.dark?"dark":"";
  if(S.screen==="login")return rLogin(a);rApp(a)
}

function rLogin(el){
  el.innerHTML=`<div class="login"><div class="logo" style="width:56px;height:56px;border-radius:14px;font-size:24px">🏠</div>
  <h2>Husaffär & Familjeekonomi</h2><p>Ange ert hushålls-ID. Första gången? Välj valfri kod (min 6 tecken).</p>
  <input id="hi" type="text" placeholder="t.ex. familjen-2025" value="${S.hid}"><button class="btn btn-p" id="hb">Anslut</button>
  <p style="font-size:10px;color:var(--fg3)">Data synkas i realtid mellan alla enheter</p></div>`;
  const hi=document.getElementById("hi"),hb=document.getElementById("hb");
  hi.addEventListener("input",e=>S.hid=e.target.value);
  hb.addEventListener("click",()=>{const id=S.hid.trim();if(id.length<6)return alert("Minst 6 tecken");connect(id)});
  hi.addEventListener("keydown",e=>{if(e.key==="Enter")hb.click()})
}

function rApp(el){
  const f=S.family,ps=S.prospects;
  const taxes=f.persons.map(p=>ptax(p.gm,p.by,{ks:f.ks,ka:f.ka,ch:p.church}));
  const bba=bb(f.children),netto=taxes.reduce((s,t)=>s+t.n,0),disp=netto+bba;
  const bt=Object.values(f.budget).reduce((s,v)=>s+v,0);
  const housing=f.curr_int+f.curr_amort+f.curr_brf+f.curr_garage;
  const surplus=disp-bt-housing;

  el.innerHTML=`<div class="app">
  <header><div class="inner">
    <div class="flex aic" style="min-width:0"><div class="logo">🏠</div><div class="htitle"><h1>Husaffär & Familjeekonomi</h1><p>Simulera · Jämför · Besluta</p></div></div>
    <div class="hpills">
      <span class="pill">Disp <b>${fSEK(disp)}</b></span>
      <span class="pill ${surplus>=0?"g":"r"}">Översk <b>${surplus>=0?"+":""}${fSEK(surplus)}</b></span>
      <button class="ib" id="td">${S.dark?"☀️":"🌙"}</button>
      <button class="ib" id="lo" title="Byt hushåll">🔑</button>
    </div>
  </div></header>

  <div class="tabs">
    <button class="tab ${S.tab==="dash"?"a":""}" data-t="dash">📊 Dashboard</button>
    <button class="tab ${S.tab==="bostad"?"a":""}" data-t="bostad">🏡 Bostad</button>
    <button class="tab ${S.tab==="prospekt"?"a":""}" data-t="prospekt">🔍 Prospekt${ps.length?` (${ps.length})`:"" }</button>
    <button class="tab ${S.tab==="compare"?"a":""}" data-t="compare">⚖️ Jämför</button>
  </div>

  <div id="tc">${rTab(f,taxes,disp,bt,housing,surplus,bba)}</div>
  </div>`;
  bind(f,taxes,disp,bt,housing,surplus,bba)
}

function rTab(f,taxes,disp,bt,housing,surplus,bba){
  if(S.tab==="dash")return rDash(f,taxes,disp,bt,housing,surplus,bba);
  if(S.tab==="bostad")return rBostad(f,taxes,disp,bt,housing);
  if(S.tab==="prospekt")return S.viewIdx!==null?rProspectDetail(f):rProspectList(f);
  return rCompare(f);
}

function rDash(f,tx,disp,bt,ho,surp,bba){

    <div class="met"><div class="met-l">${surp>=0?"📈":"📉"} Överskott</div><div class="met-v ${surp>=0?"g":"r"}">${surp>=0?"+":""}${fSEK(surp)}</div><div class="met-s">efter allt</div></div>

    <div class="cht">💰 Inkomstfördelning</div>
    <div class="fg fg2 mt6">${f.persons.map((p,i)=>`<div class="met"><div class="met-l">${p.name}</div><div class="met-v">${fSEK(tx[i].n)}</div><div class="met-s">netto · marginal ${fP(tx[i].mg)}</div></div>`).join("")}</div>
    <div class="pr mt8"><span>Barnbidrag</span><b>${fSEK(bba)}/mån</b></div>
    <div class="pr"><span>Total disponibelt</span><b style="color:var(--teal)">${fSEK(disp)}/mån</b></div>
  </div></div>
  <div class="card"><div class="card-b" style="padding-top:14px">
    <div class="cht">📋 Månadsbudget</div>

      <div class="flex gap6 aic"><span style="font-size:11px;font-family:var(--m)">${fSEK(r.surplus)}/mån</span>
        <span class="badge ${r.riskLevel==="low"?"b-green":r.riskLevel==="med"?"b-amber":"b-red"}">${r.riskLevel==="low"?"Låg risk":r.riskLevel==="med"?"Medel":"Hög risk"}</span>
      </div>
    </div>`).join("")}
  </div></div>`:""}`
}

    <button class="btn btn-p btn-sm" id="np">➕ Nytt prospekt</button></div>

    const r=calcProspect(f,p);
    return `<div class="card" style="cursor:pointer" data-vi="${i}">

          <div><span style="font-size:13px;font-weight:600">${p.name||"Namnlöst"}</span>${p.addr?`<span style="font-size:10px;color:var(--fg2);margin-left:6px">${p.addr}</span>`:""}</div>

function rProspectDetail(f){
  const i=S.viewIdx,p=S.prospects[i];if(!p)return "";
  const r=calcProspect(f,p);
  const checks=[["Ränta",1],["Amortering",1],["Uppvärmning",p.drift.heat>0],["El",p.drift.el>0],["Vatten",p.drift.water>0],["Sopor",p.drift.waste>0],["Försäkring",p.drift.ins>0],["Fast.avg",p.drift.tax>0],["Tomt",p.drift.garden>0],["Reno",p.reno>0]];

    </div>

    <div class="sr mt6"><label>Huspris</label><input type="range" min="1000000" max="20000000" step="100000" value="${p.price}" data-sk="price" class="ps"><span class="sv">${fSEK(p.price)}</span></div>
    <div class="sr"><label>Renovering</label><input type="range" min="0" max="3000000" step="50000" value="${p.reno}" data-sk="reno" class="ps"><span class="sv">${fSEK(p.reno)}</span></div>
    <div class="sr"><label>Föräldralån åter</label><input type="range" min="0" max="${p.parent_loan}" step="50000" value="${p.parent_repay}" data-sk="parent_repay" class="ps"><span class="sv">${fSEK(p.parent_repay)}</span></div>

    <div class="metrics mt8">

      <div class="met"><div class="met-l">Total boende/mån</div><div class="met-v" style="font-size:15px">${fSEK(r.totalHousing)}</div></div>
      <div class="met"><div class="met-l">Överskott/mån</div><div class="met-v ${r.surplus>=0?"g":"r"}" style="font-size:15px">${r.surplus>=0?"+":""}${fSEK(r.surplus)}</div></div>
    </div>
    <div class="pr"><span>Ränta/mån</span><b>${fSEK(r.intMonth)}</b></div>
    <div class="pr"><span>Amortering/mån</span><b>${fSEK(r.amortMonth)}</b></div>
    <div class="pr"><span>Drift/mån</span><b>${fSEK(r.drift)}</b></div>
    <div class="pr"><span>Lagfart + pantbrev</span><b>${fSEK(r.txCost)}</b></div>
    <div class="pr"><span>Skuldkvot</span><b>${r.dti}x</b></div>
    <div class="pr"><span>Stresstest 5%</span><b style="color:${r.s5>=0?"var(--teal)":"var(--rose)"}">${r.s5>=0?"+":""}${fSEK(r.s5)}</b></div>

      <div class="cks mt6">${checks.map(([l,ok])=>`<span class="ck"><span class="dt ${ok?"dt-ok":"dt-no"}"></span>${l}</span>`).join("")}</div>

  <div class="card"><div class="card-b" style="padding-top:12px">
    <div style="font-size:11px;font-weight:600">🔎 Due diligence</div>

      <div class="fi"><label><span class="prov"><span class="d" style="background:var(--blue)"></span>Annons</span> Byggår</label><input type="number" value="${p.dd.byggar||""}" data-dk="byggar" class="dd" placeholder="—"></div>
      <div class="fi"><label><span class="prov"><span class="d" style="background:var(--blue)"></span>Annons</span> Boarea m²</label><input type="number" value="${p.dd.boarea||""}" data-dk="boarea" class="dd" placeholder="—"></div>

      <div class="fi"><label><span class="prov"><span class="d" style="background:var(--green)"></span>Mynd.</span> Taxeringsvärde</label><input type="number" value="${p.dd.taxvarde||""}" data-dk="taxvarde" class="dd" placeholder="—"></div>
    </div>
    <div class="fi mt6"><label>Anteckningar (visning, iakttagelser)</label><textarea data-dk="visning_notes" class="dd" placeholder="T.ex: Bra kök, dåligt tak, bullrig gata...">${p.dd.visning_notes||""}</textarea></div>
    <div class="fi mt6"><label>Frågor till mäklaren</label><textarea data-dk="maklare_fragor" class="dd" placeholder="T.ex: Senaste takbyte? Radonmätning? Servitut?">${p.dd.maklare_fragor||""}</textarea></div>
    ${r.missing.length?`<div class="quest mt8">📋 Saknar data: ${r.missing.join(", ")} — bra att fråga mäklaren eller kolla Lantmäteriet</div>`:""}
  </div></div>

  <div class="card"><div class="card-b" style="padding-top:12px">

    ${r.risks.map(ri=>`<div class="risk-card ${ri.l}" style="margin-top:6px"><div style="font-size:11px;font-weight:600">${ri.t}</div><div style="font-size:10px;color:var(--fg2)">${ri.d}</div></div>`).join("")}
  </div></div>

    <div style="font-size:11px;font-weight:600">Driftkostnader (kr/mån)</div>

  </div></div>`
}

function rCompare(f){
  if(!S.prospects.length)return `<div class="empty"><div class="empty-i">⚖️</div><p style="font-size:12px">Lägg till prospekt först</p></div>`;
  const ho=f.curr_int+f.curr_amort+f.curr_brf+f.curr_garage;
  const rs=S.prospects.map(p=>calcProspect(f,p));
  const rows=[["Huspris",r=>fSEK(r.price),""],["Nytt bolån",r=>fSEK(r.mortgage),""],["LTV",r=>fP(r.ltv),r=>r.ltv>.85?"r":r.ltv>.7?"a":""],["Skuldkvot",r=>`${r.dti}x`,r=>r.dti>4.5?"r":r.dti>3.5?"a":""],["Boende/mån",r=>`${fN(r.totalHousing)} kr`,""],["Överskott",r=>`${r.surplus>=0?"+":""}${fN(r.surplus)} kr`,r=>r.surplus>=0?"g":"r"],["Stresstest 5%",r=>`${r.s5>=0?"+":""}${fN(r.s5)} kr`,r=>r.s5>=0?"g":"r"],["Stresstest 7%",r=>`${r.s7>=0?"+":""}${fN(r.s7)} kr`,r=>r.s7>=0?"g":"r"],["Risk",r=>r.riskLevel==="low"?"Låg":r.riskLevel==="med"?"Medel":"Hög",r=>r.riskLevel==="low"?"g":r.riskLevel==="med"?"a":"r"]];
  return `<div class="card" style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">
    <thead><tr><th style="text-align:left;padding:8px;font-size:9px;text-transform:uppercase;color:var(--fg2);border-bottom:1px solid var(--border)">Nyckeltal</th>
    <th style="text-align:right;padding:8px;font-size:9px;text-transform:uppercase;color:var(--teal);border-bottom:1px solid var(--border)">Nuvarande</th>
    ${rs.map(r=>`<th style="text-align:right;padding:8px;font-size:9px;text-transform:uppercase;color:var(--fg2);border-bottom:1px solid var(--border)">${r.name||"?"}</th>`).join("")}</tr></thead>
    <tbody>${rows.map(([l,fn,cfn])=>`<tr>
      <td style="padding:5px 8px;border-bottom:1px solid var(--bg2);color:var(--fg2)">${l}</td>
      <td style="padding:5px 8px;border-bottom:1px solid var(--bg2);text-align:right;font-family:var(--m)">—</td>
      ${rs.map(r=>{const c=typeof cfn==="function"?cfn(r):"";return `<td style="padding:5px 8px;border-bottom:1px solid var(--bg2);text-align:right;font-family:var(--m);${c==="g"?"color:var(--teal)":c==="r"?"color:var(--rose)":c==="a"?"color:var(--amber)":""}">${fn(r)}</td>`}).join("")}
    </tr>`).join("")}</tbody></table></div>`
}

// EVENTS
function bind(){
  document.getElementById("td")?.addEventListener("click",()=>{S.dark=!S.dark;render()});
  document.getElementById("lo")?.addEventListener("click",()=>{localStorage.removeItem("hid");if(dbRef)dbRef.off();dbRef=null;S.screen="login";S.hid="";render()});
  document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{S.viewIdx=null;S.tab=t.dataset.t;render();setTimeout(updateCharts,60)}));
  // Bostad
  const bf=(id,k,parse)=>{document.getElementById(id)?.addEventListener("change",e=>{const v=parse?parse(e.target.value):e.target.value;ss({family:{...S.family,[k]:v}})})};
  bf("ca","curr_addr");bf("cv","curr_value",v=>Math.max(0,+v||0));bf("cm","curr_mortgage",v=>Math.max(0,+v||0));
  bf("ci","curr_int",v=>Math.max(0,+v||0));bf("cam","curr_amort",v=>Math.max(0,+v||0));bf("cb","curr_brf",v=>Math.max(0,+v||0));bf("cg","curr_garage",v=>Math.max(0,+v||0));
  bf("cr","rate",v=>Math.max(.01,+v||2.2)/100);
  document.getElementById("crs")?.addEventListener("input",e=>{ss({family:{...S.family,rate:+e.target.value/100}})});
  document.getElementById("cch")?.addEventListener("input",e=>{ss({family:{...S.family,children:+e.target.value}})});
  document.querySelectorAll(".pi").forEach(el=>el.addEventListener("change",e=>{const ps=[...S.family.persons];ps[+e.target.dataset.pi]={...ps[+e.target.dataset.pi],[e.target.dataset.pf]:Math.max(0,+e.target.value||0)};ss({family:{...S.family,persons:ps}})}));
  document.querySelectorAll(".bi").forEach(el=>el.addEventListener("change",e=>{ss({family:{...S.family,budget:{...S.family.budget,[e.target.dataset.bk]:Math.max(0,+e.target.value||0)}}})}));
  // New prospect
  document.getElementById("np")?.addEventListener("click",()=>{const np=dc(PDEF);np.name=`Prospekt ${S.prospects.length+1}`;np.apt_sale=S.family.curr_value||10000000;ss({prospects:[...S.prospects,np],viewIdx:S.prospects.length})});
  // View prospect
  document.querySelectorAll("[data-vi]").forEach(el=>el.addEventListener("click",()=>{S.viewIdx=+el.dataset.vi;render()}));
  // Prospect detail
  document.getElementById("backp")?.addEventListener("click",()=>{S.viewIdx=null;render()});
  document.getElementById("delp")?.addEventListener("click",()=>{if(!confirm("Radera prospekt?"))return;const ps=S.prospects.filter((_,j)=>j!==S.viewIdx);ss({prospects:ps,viewIdx:null})});
  document.getElementById("ps")?.addEventListener("change",e=>{const ps=dc(S.prospects);ps[S.viewIdx].status=e.target.value;ss({prospects:ps})});
  document.querySelectorAll(".pp").forEach(el=>el.addEventListener("change",e=>{const ps=dc(S.prospects);ps[S.viewIdx][e.target.dataset.pk]=e.target.value;ss({prospects:ps})}));
  document.querySelectorAll(".ps").forEach(el=>el.addEventListener("input",e=>{const ps=dc(S.prospects);ps[S.viewIdx][e.target.dataset.sk]=+e.target.value;ss({prospects:ps})}));
  document.querySelectorAll(".dd").forEach(el=>el.addEventListener("change",e=>{const ps=dc(S.prospects);const v=e.target.type==="number"?(+e.target.value||null):e.target.value;ps[S.viewIdx].dd[e.target.dataset.dk]=v;ss({prospects:ps})}));
  document.querySelectorAll(".dri").forEach(el=>el.addEventListener("change",e=>{const ps=dc(S.prospects);ps[S.viewIdx].drift[e.target.dataset.drk]=Math.max(0,+e.target.value||0);ss({prospects:ps})}));
}

// CHARTS
function updateCharts(){
  Object.values(S.charts).forEach(c=>{try{c.destroy()}catch(e){}});S.charts={};
  const f=S.family,ps=S.prospects;
  const tc=S.dark?"#9C9588":"#6B6358",gc=S.dark?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)";
  const C={coral:"#C2532E",amber:"#D4890F",teal:"#1A8A65",purple:"#6B4DAA",blue:"#2E78B7"};
  if(S.tab==="dash"){
    // Budget donut
    const bEl=document.getElementById("dashBudget");
    if(bEl){const b=f.budget;S.charts.bud=new Chart(bEl,{type:"doughnut",data:{labels:Object.values(BUD_L),datasets:[{data:Object.values(b),backgroundColor:[C.coral,C.amber,C.teal,"#888","#aaa",C.purple,C.blue,"#bbb","#1A8A65","#6B6358"],borderWidth:1.5,borderColor:S.dark?"#1E1B17":"#fff"}]},options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{legend:{position:"right",labels:{font:{size:9},color:tc,padding:6}}}}})}
    if(ps.length){
      const rs=ps.map(p=>calcProspect(f,p));
      const ho=f.curr_int+f.curr_amort+f.curr_brf+f.curr_garage;
      // Bar
      const barEl=document.getElementById("dashBar");
      if(barEl){const labels=["Nuvarande",...rs.map(r=>r.name||"?")];
        S.charts.bar=new Chart(barEl,{type:"bar",data:{labels,datasets:[
          {label:"Ränta",data:[f.curr_int,...rs.map(r=>r.intMonth)],backgroundColor:C.coral},
          {label:"Drift",data:[f.curr_brf+f.curr_garage,...rs.map(r=>r.drift)],backgroundColor:C.teal},
          {label:"Amortering",data:[f.curr_amort,...rs.map(r=>r.amortMonth)],backgroundColor:C.amber,borderRadius:{topLeft:3,topRight:3}}
        ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:9},color:tc}}},scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:9},color:tc}},y:{stacked:true,grid:{color:gc},ticks:{font:{size:9},color:tc,callback:v=>Math.round(v/1000)+"k"},border:{display:false}}}}})}
      // Stress
      const stEl=document.getElementById("dashStress");
      if(stEl){const rates=[.02,.025,.03,.035,.04,.05,.06,.07];const cols=[C.coral,C.teal,C.blue,C.purple,C.amber];
        const ds=rs.map((r,j)=>({label:r.name||"?",data:rates.map(rate=>Math.round(calcSurplusAtRate(f,ps[j],rate))),borderColor:cols[j%5],backgroundColor:cols[j%5]+"18",fill:true,tension:.3,pointRadius:2,borderWidth:2}));
        S.charts.stress=new Chart(stEl,{type:"line",data:{labels:rates.map(r=>`${(r*100).toFixed(1)}%`),datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:9},color:tc}}},scales:{x:{grid:{display:false},ticks:{font:{size:9},color:tc}},y:{grid:{color:gc},ticks:{font:{size:9},color:tc,callback:v=>{const a=Math.abs(v);return `${v<0?"−":""}${a>=1000?Math.round(a/1000)+"k":a}`}},border:{display:false}}}}})}
    }
  }
}

if(saved){S.hid=saved;connect(saved)}else render()
</script>
</body>
</html>
