    {k:"boarea",w:3,src:dd._src_boarea||""},

    {k:"badrum_ar",w:1,src:dd._src_badrum_ar||""},

// === VÄRDERING ===
function calcValuation(p){
  var dd=p.dd||{},price=N(p.price),boa=N(dd.boarea),byggar=N(dd.byggar),tomt=N(dd.tomtarea);
  var yr=new Date().getFullYear(),husAge=byggar?(yr-byggar):0;
  var v={methods:[],prisM2:boa>0&&price>0?Math.round(price/boa):null,confidence:0,estimate:null,band:null};
  var estimates=[];

  // === NIVÅ 1: Schablon (boarea × basbelopp justerat för område) ===
  if(boa>0){
    // Basbelopp Billdal/Hovås/Kullavik: 42-55k/m², justerat för storlek (större hus = lägre kr/m²)
    var baseM2=48000;
    if(boa>200)baseM2=42000;else if(boa>150)baseM2=45000;else if(boa<100)baseM2=52000;
    // Byggårsjustering
    var ageAdj=1.0;
    if(byggar){if(byggar>=2015)ageAdj=1.15;else if(byggar>=2000)ageAdj=1.08;else if(byggar>=1990)ageAdj=1.0;else if(byggar>=1970)ageAdj=0.90;else ageAdj=0.82}
    // Tomtjustering
    var tomtAdj=1.0;
    if(tomt>1000)tomtAdj=1.08;else if(tomt>600)tomtAdj=1.04;else if(tomt>0&&tomt<300)tomtAdj=0.95;
    // Energi/uppvärmning
    var enerAdj=1.0;var ek=(dd.energiklass||"").toUpperCase();
    if(ek==="A"||ek==="B")enerAdj=1.06;else if(ek==="C")enerAdj=1.02;else if(ek==="F"||ek==="G")enerAdj=0.92;
    var upv=(dd.uppvarmning||"").toLowerCase();
    if(upv.indexOf("pump")>=0)enerAdj*=1.03;else if(upv.indexOf("direkt")>=0)enerAdj*=0.95;
    // Skick/reno-behov sänker värde
    var renoAdj=1.0;var reno=N(p.reno)||0;
    // Synka reno: använd summan från renoveringsplanen om den finns
    var plans=p.reno_plan||[];if(plans.length){var planTotal=0;plans.forEach(function(pl){planTotal+=estimateReno(pl.desc).totalMid});if(planTotal>0)reno=planTotal}
    if(reno>500000)renoAdj=0.90;else if(reno>200000)renoAdj=0.95;else if(reno>50000)renoAdj=0.97;

    var adjM2=Math.round(baseM2*ageAdj*tomtAdj*enerAdj*renoAdj);
    var mid=Math.round(boa*adjM2);
    var spread=byggar?0.12:0.25;// tightare band om vi har byggår
    var conf=30+(byggar?15:0)+(tomt?10:0)+(ek?10:0)+(upv?5:0);
    estimates.push({mid:mid,spread:spread,weight:conf});
    var factors=[];
    if(ageAdj!==1.0)factors.push("byggår "+(ageAdj>1?"+":"")+Math.round((ageAdj-1)*100)+"%");
    if(tomtAdj!==1.0)factors.push("tomt "+(tomtAdj>1?"+":"")+Math.round((tomtAdj-1)*100)+"%");
    if(enerAdj!==1.0)factors.push("energi "+(enerAdj>1?"+":"")+Math.round((enerAdj-1)*100)+"%");
    if(renoAdj!==1.0)factors.push("renobehov "+Math.round((renoAdj-1)*100)+"%");
    v.methods.push({name:"Schablon ("+adjM2+" kr/m²)",mid:mid,low:Math.round(mid*(1-spread)),high:Math.round(mid*(1+spread)),conf:conf,factors:factors});
  }

  // === NIVÅ 2: Taxeringsvärde ===
  var tv=N(dd.taxvarde);
  if(tv>0){
    var multi=byggar&&byggar>=2010?1.3:byggar&&byggar>=1990?1.35:1.45;
    var mid2=Math.round(tv*multi);
    estimates.push({mid:mid2,spread:0.10,weight:50});
    v.methods.push({name:"Taxering ×"+multi.toFixed(2),mid:mid2,low:Math.round(tv*1.25),high:Math.round(tv*1.55),conf:50,factors:["Taxvärde "+fSEK(tv)]});
  }

  // === NIVÅ 3: Jämförelseobjekt ===
  var comps=p.comparables||[];
  if(comps.length){
    var compEstimates=comps.filter(function(c){return N(c.price)&&N(c.boarea)}).map(function(c){
      var cM2=N(c.price)/N(c.boarea);
      // Justera för skillnader mot detta prospekt
      var adj=1.0;
      if(byggar&&N(c.byggar)){var ageDiff=N(c.byggar)-byggar;adj+=ageDiff*0.003}// 0.3% per år skillnad
      if(boa&&N(c.boarea)){var sizeDiff=(boa-N(c.boarea))/N(c.boarea);adj-=sizeDiff*0.15}// större hus = lägre kr/m²
      return Math.round(boa*cM2*adj);
    });
    if(compEstimates.length){
      var avg=Math.round(compEstimates.reduce(function(s,v){return s+v},0)/compEstimates.length);
      var conf3=60+compEstimates.length*10;// fler comps = högre konfidens
      estimates.push({mid:avg,spread:0.08,weight:conf3});
      v.methods.push({name:"Jämförelse ("+comps.length+" objekt)",mid:avg,low:Math.round(avg*0.92),high:Math.round(avg*1.08),conf:conf3,factors:comps.map(function(c){return (c.addr||"?")+": "+fSEK(N(c.price))})});
    }
  }

  // === NYBYGG referens ===
  if(boa>0){var tomtv=tomt>0?tomt*2500:500000;var mid3=Math.round(boa*40000+tomtv);
    v.methods.push({name:"Nybyggnadskostnad",mid:mid3,low:Math.round(boa*32000+tomtv),high:Math.round(boa*48000+tomtv),conf:20,factors:["Referens — inte marknadsvärde"]})}

  // === VIKTAT SNITT ===
  if(estimates.length){
    var totalW=estimates.reduce(function(s,e){return s+e.weight},0);
    var wMid=Math.round(estimates.reduce(function(s,e){return s+e.mid*e.weight},0)/totalW);
    var wSpread=estimates.reduce(function(s,e){return s+e.spread*e.weight},0)/totalW;
    v.estimate=wMid;
    v.band={low:Math.round(wMid*(1-wSpread)),high:Math.round(wMid*(1+wSpread))};
    v.confidence=Math.min(95,Math.round(totalW/1.5));
  }
  return v;
}

// === AFFÄRSANALYS ===
function calcDeal(f,p,r){
  var price=N(p.price),reno=N(p.reno);
  var engangskostnad=r.txCost+reno;
  var currH=N(f.curr_int)+N(f.curr_amort)+N(f.curr_brf)+N(f.curr_garage);
  var diffMon=r.totalHousing-currH;
  // Total ägandekostnad 5 år
  var kostnad5ar=engangskostnad+r.totalHousing*60;
  var nuvarande5ar=currH*60;
  // Break-even (om dyrare: när tjänar man in flytten via värdeutveckling?)
  var breakEvenYears=null;
  if(engangskostnad>0){
    var uppg=price*0.02;// 2%/år värdeutveckling
    if(uppg>0)breakEvenYears=Math.round(engangskostnad/uppg*10)/10;
  }
  // Värdeutveckling 5 år (2% scenario)
  var varde5ar=Math.round(price*Math.pow(1.02,5));
  var equity5ar=varde5ar-Math.max(0,r.mortgage-r.amortMonth*60);
  // Underhållsreserv
  var dd=p.dd||{},boa=N(dd.boarea)||150,byggar=N(dd.byggar)||2000;
  var husAlder=new Date().getFullYear()-byggar;
  // Schablon: nyare hus 100 kr/m2/år, äldre 200-300
  var underhallM2=husAlder<10?80:husAlder<25?150:husAlder<40?220:300;
  var underhallAr=Math.round(boa*underhallM2);
  var underhallMan=Math.round(underhallAr/12);
  return{engangskostnad:engangskostnad,diffMon:diffMon,kostnad5ar:kostnad5ar,nuvarande5ar:nuvarande5ar,breakEvenYears:breakEvenYears,varde5ar:varde5ar,equity5ar:equity5ar,underhallAr:underhallAr,underhallMan:underhallMan,husAlder:husAlder}
}

function estimateReno(text){
  text=(text||"").toLowerCase();
  var matches=[];var totalLow=0,totalMid=0,totalHigh=0;
  // Extract size numbers
  var sizeMatch=text.match(/(\d+)\s*(kvm|m2|m²|kvadrat)/);
  var size=sizeMatch?N(sizeMatch[1]):0;
  var stMatch=text.match(/(\d+)\s*st/);
  var count=stMatch?N(stMatch[1]):1;
  // Check keywords
  for(var key in RENO_DB){
    if(text.indexOf(key)>=0||(key==="vägg"&&text.indexOf("riv")>=0)){
      var r=RENO_DB[key];var qty=r.unit==="m2"?(size||15):r.unit==="lm"?(size||30):(count||1);
      var low=Math.round(r.min*qty),mid=Math.round(r.base*qty),high=Math.round(r.max*qty);
      // Hög/låg standard
      if(text.indexOf("hög")>=0||text.indexOf("lyx")>=0||text.indexOf("premium")>=0){low=mid;mid=high;high=Math.round(high*1.3)}
      if(text.indexOf("enkel")>=0||text.indexOf("budget")>=0){high=mid;mid=low;low=Math.round(low*0.8)}
      matches.push({name:r.desc+(r.unit==="m2"?" "+qty+"m²":r.unit==="lm"?" "+qty+"lm":qty>1?" ×"+qty:""),low:low,mid:mid,high:high});
      totalLow+=low;totalMid+=mid;totalHigh+=high;
    }
  }
  if(!matches.length&&size>0){
    matches.push({name:"Renovering "+size+"m²",low:size*3000,mid:size*5000,high:size*8000});
    totalLow+=size*3000;totalMid+=size*5000;totalHigh+=size*8000;
  }
  return{matches:matches,totalLow:totalLow,totalMid:totalMid,totalHigh:totalHigh}
}

// === ROT-AVDRAG ===
function calcROT(renoPlans){
  var totalLabor=0;
  (renoPlans||[]).forEach(function(pl){
    var e=estimateReno(pl.desc);
    // Schablon: 60% av renoveringskostnad är arbetskostnad
    totalLabor+=Math.round(e.totalMid*0.6);
  });
  var rotPerPerson=Math.min(50000,Math.round(totalLabor*0.3));
  var totalROT=rotPerPerson*2;// 2 personer
  return{totalLabor:totalLabor,rotPerPerson:rotPerPerson,totalROT:totalROT};
}

// === RÄNTEAVDRAG ===
function calcInterestDeduction(yearlyInterest){
  var yi=N(yearlyInterest);
  if(yi<=0)return{deduction:0,monthlySaving:0};
  var ded=yi<=100000?Math.round(yi*0.3):Math.round(100000*0.3+(yi-100000)*0.21);
  return{deduction:ded,monthlySaving:Math.round(ded/12),effectiveRate:yi>0?Math.round((1-ded/yi)*1000)/1000:0};
}

// === LIVSCYKELANALYS ===
function calcLifecycle(f,p,r,years){
  years=years||10;
  var totalHousing=r.totalHousing*12*years;
  var engangskost=r.txCost+N(p.reno);
  var underhall=Math.round((N(p.dd?.boarea)||150)*(N(p.dd?.byggar)?((new Date().getFullYear()-N(p.dd.byggar))<25?150:250):200))*years;
  var totalCost=totalHousing+engangskost+underhall;
  // Value appreciation
  var endValue=Math.round(N(p.price)*Math.pow(1.02,years));
  var endMortgage=Math.max(0,r.mortgage-r.amortMonth*12*years);
  var endEquity=endValue-endMortgage;
  // vs renting
  var rentCost=MACRO.hyraVilla150m2Gbg*12*years;
  var rentSaving=rentCost-totalHousing;// positive = owning is cheaper
  // Net position
  var netPosition=endEquity-totalCost;
  return{years:years,totalCost:totalCost,engangskost:engangskost,underhall:underhall,totalHousing:totalHousing,endValue:endValue,endMortgage:endMortgage,endEquity:endEquity,rentCost:rentCost,netPosition:netPosition};
}

// === ENERGIBESPARING ===
function calcEnergySaving(p){
  var dd=p.dd||{},boa=N(dd.boarea)||150,byggar=N(dd.byggar)||2000;
  var items=[];
  var upv=(dd.uppvarmning||"").toLowerCase();
  // VP potential
  if(upv.indexOf("pump")<0&&upv.indexOf("fjärr")<0){
    var currHeatYear=boa*180;// schablon kWh/m2/år för direktel
    var vpHeatYear=boa*60;// med VP
    var saving=Math.round((currHeatYear-vpHeatYear)*1.5/12);// ~1.5 kr/kWh
    items.push({name:"Värmepump (berg/luft-vatten)",invest:"80–150 tkr",savingMon:saving,roi:Math.round(120000/saving/12*10)/10,co2:"~60% mindre"});
  }
  // Solceller
  if(boa>80){
    var paneler=Math.min(20,Math.round(boa*0.3/1.7));// ~30% av tak, 1.7m²/panel
    var prod=paneler*1000;// ~1000 kWh/panel/år i Gbg
    var solSaving=Math.round(prod*1.2/12);// ~1.2 kr/kWh snitt
    items.push({name:"Solceller ("+paneler+" paneler)",invest:(paneler*8000/1000).toFixed(0)+"–"+(paneler*12000/1000).toFixed(0)+" tkr",savingMon:solSaving,roi:Math.round(paneler*10000/solSaving/12*10)/10,co2:"~"+Math.round(prod*0.04)+" kg CO₂/år"});
  }
  // Tilläggsisolering
  if(byggar<1980){
    var isoSaving=Math.round(boa*2);
    items.push({name:"Tilläggsisolering vind",invest:"30–80 tkr",savingMon:isoSaving,roi:Math.round(50000/isoSaving/12*10)/10,co2:"~20% lägre"});
  }
  // Fönsterbyte
  if(byggar<1990){
    var fonSaving=Math.round(boa*1.5);
    items.push({name:"Energifönster",invest:"100–250 tkr",savingMon:fonSaving,roi:Math.round(150000/fonSaving/12*10)/10,co2:"~15% lägre"});
  }
  return items;
}

// === PROVISION ===
function calcProvision(salePrice,prov){
  if(!prov)return Math.round(N(salePrice)*0.02);
  if(prov.type==="flat")return Math.round(N(salePrice)*N(prov.flat_pct)/100);
  // Trappa: base + steps
  var total=N(prov.base)||0;
  var steps=(prov.steps||[]).slice().sort(function(a,b){return N(a.from)-N(b.from)});
  for(var i=0;i<steps.length;i++){
    var s=steps[i],from=N(s.from),to=N(s.to)||999999999,pct=N(s.pct)/100;
    if(N(salePrice)>from){
      var taxable=Math.min(N(salePrice),to)-from;
      total+=Math.round(taxable*pct);
    }
  }
  return total;
}

function rPD(f,c){var i=S.viewIdx,p=S.prospects[i];if(!p)return "";var r=calcP(f,p),currH=c.housing,diff=r.totalHousing-currH;var dd=p.dd||{};var cl=p.checklist||{};
  var maint=calcMaintenance(p),urgN=maint.filter(function(m){return m.priority==="high"}).length;

  var tReno=0;plans.forEach(function(pl){tReno+=estimateReno(pl.desc).totalMid});var rot=calcROT(plans);
  var val=calcValuation(p);var deal=calcDeal(f,p,r);
  var yi=r.mortgage*r.rate,rd=calcInterestDeduction(yi);
  var lc=N(p.price)?calcLifecycle(f,p,r,10):null;
  var nb=p._nearby||{};
  // Auto-check logic
  function ck(key,auto){var isAuto=auto&&auto();return{checked:cl[key]||isAuto,auto:isAuto,key:key}}
  var checks=[
    ck("addr_search",function(){return!!dd.kommun}),ck("byggår_known",function(){return!!dd.byggar}),
    ck("boarea_known",function(){return!!dd.boarea}),ck("energiklass_known",function(){return!!dd.energiklass}),
    ck("taxvarde_known",function(){return!!dd.taxvarde}),ck("prishistorik",function(){return!!(nb.skolor||[]).length}),
    ck("besiktning"),ck("radon"),ck("fukt_visning"),ck("grannar"),ck("servitut",function(){return!!dd.fastighetsbeteckning}),
    ck("dolda_fel"),ck("skola_kollat",function(){return!!(nb.skolor||[]).length}),ck("tilltrade"),ck("forsakring")
  ];
  var ckDone=checks.filter(function(c){return c.checked}).length,ckTotal=checks.length;
  // Grade
  var score=0;if(r.surplus>=10000)score+=3;else if(r.surplus>=5000)score+=2;else if(r.surplus>=0)score+=1;
  if(r.ltv<=0.7)score+=2;else if(r.ltv<=0.85)score+=1;if(r.s5>=0)score+=2;else if(r.s7>=0)score+=1;
  if(r.dataQuality>=70)score+=1;if(urgN===0)score+=2;else if(urgN<=1)score+=1;
  var grade=score>=8?"A":score>=6?"B":score>=4?"C":"D";
  var gCol=grade==="A"?"var(--teal)":grade==="B"?"var(--blue)":grade==="C"?"var(--amber)":"var(--rose)";
  // Helper for check-item rendering

  function vB(l,rng,pr){if(!rng)return '';var mn=rng.low,mx=rng.high,md=rng.mid,pp=pr>0?Math.min(100,Math.round((pr-mn)/(mx-mn+1)*100)):50;return '<div style="margin:3px 0"><div class="flex aic jcb" style="font-size:10px"><span style="color:var(--fg2)">'+l+'</span><span style="font-family:var(--m)">'+fSEK(md)+'</span></div><div style="position:relative;height:5px;background:var(--border);border-radius:3px;margin:2px 0"><div style="position:absolute;height:100%;width:100%;border-radius:3px;background:linear-gradient(90deg,var(--teal),var(--amber),var(--rose))"></div>'+(pr>0?'<div style="position:absolute;left:'+pp+'%;top:-2px;width:3px;height:9px;background:var(--fg);border-radius:2px"></div>':'')+'</div></div>'}

  // ===== SUMMARY =====
  var hdr='<button class="btn btn-s btn-sm" id="backp">← Tillbaka</button>'+
    '<div class="summary"><div class="flex aic jcb"><div class="flex aic gap6"><span style="font-size:16px;font-weight:700">'+(p.name||"Namnlöst")+'</span><select id="ps" style="font-size:10px;padding:2px 6px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--fg)">'+Object.keys(STATUS_L).map(function(k){return '<option value="'+k+'"'+(p.status===k?" selected":"")+'>'+STATUS_L[k]+'</option>'}).join('')+'</select></div><div class="flex aic gap6"><span style="font-size:28px;font-weight:700;color:'+gCol+'">'+grade+'</span><span style="font-size:10px;color:var(--fg2)">'+score+'/10</span><button class="btn btn-d btn-sm" id="delp">🗑️</button></div></div>'+
    '<div class="metrics mt6"><div class="met"><div class="met-l">Boende/mån</div><div class="met-v" style="font-size:15px">'+fSEK(r.totalHousing)+'</div></div><div class="met"><div class="met-l">Överskott</div><div class="met-v '+(r.surplus>=0?"g":"r")+'" style="font-size:15px">'+(r.surplus>=0?"+":"")+fSEK(r.surplus)+'</div></div><div class="met"><div class="met-l">vs nuvarande</div><div class="met-v '+(diff<=0?"g":"r")+'" style="font-size:15px">'+(diff>=0?"+":"")+fSEK(diff)+'</div></div><div class="met"><div class="met-l">Readiness</div><div class="met-v" style="font-size:15px">'+ckDone+'/'+ckTotal+'</div></div></div></div>';

  // ===== 1. GRUNDDATA & SÖK =====

    (dd.hustyp||dd.narmaste_skola||dd.narmaste_hpl?'<div class="flex gap6 mt6" style="flex-wrap:wrap">'+(dd.hustyp?'<span class="kpi" style="font-size:10px">'+srcDot("auth")+' '+dd.hustyp+'</span>':'')+(dd.narmaste_skola?'<span class="kpi" style="font-size:10px">🏫 '+dd.narmaste_skola+'</span>':'')+(dd.narmaste_hpl?'<span class="kpi" style="font-size:10px">🚌 '+dd.narmaste_hpl+'</span>':'')+'</div>':'')+
    '<div class="dq mt6"><span class="dq-label">Data</span><div class="dq-bar"><div class="dq-fill" style="width:'+r.dataQuality+'%;background:'+(r.dataQuality>=70?'var(--teal)':r.dataQuality>=40?'var(--amber)':'var(--rose)')+'"></div></div><span class="dq-pct">'+r.dataQuality+'%</span></div>'+

    '<div class="sr"><label>Renovering</label><input type="range" min="0" max="3000000" step="50000" value="'+N(p.reno)+'" data-sk="reno" class="psl"><input type="number" value="'+N(p.reno)+'" data-sk="reno" class="pnm"></div>'+
    '<div class="sr"><label>Föräldr.lån</label><input type="range" min="0" max="'+(N(p.parent_loan)||1200000)+'" step="50000" value="'+N(p.parent_repay)+'" data-sk="parent_repay" class="psl"><input type="number" value="'+N(p.parent_repay)+'" data-sk="parent_repay" class="pnm"></div>'+
    '<div class="fg fg4 mt6"><div class="met"><div class="met-l">Bolån</div><div class="met-v" style="font-size:13px">'+fSEK(r.mortgage)+'</div><div class="met-s">LTV '+fP(r.ltv)+'</div></div><div class="met"><div class="met-l">Ränta</div><div class="met-v" style="font-size:13px">'+fSEK(r.intMonth)+'</div><div class="met-s">/mån ('+fP(r.rate)+')</div></div><div class="met"><div class="met-l">Amort.</div><div class="met-v" style="font-size:13px">'+fSEK(r.amortMonth)+'</div><div class="met-s">/mån ('+fP(r.amortRate)+')</div></div><div class="met"><div class="met-l">Drift</div><div class="met-v" style="font-size:13px">'+fSEK(r.drift)+'</div><div class="met-s">/mån</div></div></div>'+

    (yi?'<div class="pr mt6"><span>Ränteavdrag</span><b style="color:var(--teal)">−'+fSEK(rd.monthlySaving)+'/mån (effektiv '+fP(r.rate*rd.effectiveRate)+')</b></div>':'')+

    // Confidence-weighted estimate
    (val.estimate?'<div style="background:var(--bg2);border-radius:8px;padding:10px;margin:8px 0"><div class="flex aic jcb"><span style="font-size:12px;font-weight:600">Estimerat marknadsvärde</span><span style="font-size:16px;font-weight:700;font-family:var(--m);color:var(--teal)">'+fSEK(val.estimate)+'</span></div>'+

function rTasksContent(){
  var items=TASKS.items||[];
  var pending=items.filter(function(t){return!t.done});
  var done=items.filter(function(t){return t.done});
  var shopPending=(SHOP.items||[]).filter(function(it){return!it.done}).length;
  var filter=S.taskFilter||"alla";
  if(filter!=="alla")pending=pending.filter(function(t){return t.cat===filter});

  // Sort: priority high first, then by date added
  var priOrd={hög:0,medel:1,låg:2};
  pending.sort(function(a,b){return(priOrd[a.pri]||1)-(priOrd[b.pri]||1)||(a.added||0)-(b.added||0)});

  return ''+

    // Filter
    '<div class="task-filter"><button class="'+(filter==="alla"?"a":"")+'" data-tf="alla">Alla ('+pending.length+')</button>'+
    TASKS.categories.map(function(c){var cnt=items.filter(function(t){return!t.done&&t.cat===c}).length;return '<button class="'+(filter===c?"a":"")+'" data-tf="'+c+'">'+c+(cnt?' ('+cnt+')':'')+'</button>'}).join('')+'</div>'+

    // Pending
    pending.map(function(t){var idx=items.indexOf(t);
      return '<div class="task-item'+(t.done?" done":"")+'" data-ti="'+idx+'">'+
        '<div class="t-chk" data-tcheck="'+idx+'">'+(t.done?"✓":"")+'</div>'+
        '<div class="t-body"><div class="t-name">'+(TASK_TYPES[t.type]||"✅")+' '+t.text+'</div>'+
        '<div class="t-meta"><span>'+t.cat+'</span>'+(t.pri==="hög"?'<span style="color:var(--rose)">⬆ Hög</span>':t.pri==="låg"?'<span style="color:var(--fg3)">⬇ Låg</span>':'')+(t.date?'<span>📅 '+t.date+'</span>':'')+(t.assignee?'<span>👤 '+t.assignee+'</span>':'')+'</div></div>'+
        '<div class="t-actions"><button class="ib" data-tpri="'+idx+'" title="Prioritet">⬆</button><button class="ib" data-tassign="'+idx+'" title="Tilldela">👤</button><button class="del-item" data-tdel="'+idx+'">×</button></div></div>'
    }).join('')+

    (pending.length===0?'<div class="empty" style="padding:20px"><div style="font-size:28px;margin-bottom:6px">'+(filter==="alla"?"🎉":"📋")+'</div><div style="font-size:13px;font-weight:600">'+(filter==="alla"?"Allt klart!":"Inga uppgifter i "+filter)+'</div></div>':'')+

    // Done (collapsed)
    (done.length?'<div style="margin-top:16px"><div class="flex aic jcb"><span style="font-size:10px;color:var(--fg2)">✓ Klara ('+done.length+')</span><button class="btn btn-s btn-sm" id="clearTasks">Rensa</button></div>'+
    done.slice(0,5).map(function(t){var idx=items.indexOf(t);return '<div class="task-item done"><div class="t-chk" data-tcheck="'+idx+'">✓</div><div class="t-body"><div class="t-name">'+(TASK_TYPES[t.type]||"✅")+' '+t.text+'</div></div></div>'}).join('')+
    (done.length>5?'<div style="font-size:10px;color:var(--fg3);padding:4px 0">+ '+(done.length-5)+' till...</div>':'')+'</div>':'')
}

function bindTasks(){
  var inp=document.getElementById("taskInput");if(!inp)return;
  var typesel=document.getElementById("taskType");
  function addTask(text){
    text=text.trim();if(!text)return;
    var type=typesel?typesel.value:"task";
    // Auto-detect type from text
    if(/handla|köp|ica|mat/i.test(text))type="shop";
    if(/system|vin|öl/i.test(text))type="systemet";
    if(/visning|hus|mäklar/i.test(text))type="visning";
    if(/boka|beställ/i.test(text))type="boka";
    if(/ring|samtal/i.test(text))type="samtal";
    // Auto-detect category
    var cat="Övrigt";
    if(/städ|tvätt|disk|fixa|laga|monter|byt/i.test(text))cat="Hem";
    if(/handla|köp|ica|mat|system/i.test(text))cat="Inköp";
    if(/visning|hus|mäklar|bud|prospekt/i.test(text))cat="Husjakten";
    if(/barn|skola|förskola|aktivitet/i.test(text))cat="Barn";
    TASKS.items.push({text:text,type:type,cat:cat,done:false,pri:"medel",added:Date.now(),assignee:"",date:""});
    taskSync();render();
    setTimeout(function(){var i=document.getElementById("taskInput");if(i){i.focus();i.value=""}},50);
  }
  inp.addEventListener("keydown",function(e){if(e.key==="Enter"){addTask(inp.value);inp.value=""}});
  var addBtn=document.getElementById("taskAdd");if(addBtn)addBtn.addEventListener("click",function(){addTask(inp.value);inp.value=""});
  // Check/uncheck
  document.querySelectorAll("[data-tcheck]").forEach(function(el){el.addEventListener("click",function(){var idx=N(el.dataset.tcheck);TASKS.items[idx].done=!TASKS.items[idx].done;taskSync();render()})});
  // Delete
  document.querySelectorAll("[data-tdel]").forEach(function(el){el.addEventListener("click",function(e){e.stopPropagation();TASKS.items.splice(N(el.dataset.tdel),1);taskSync();render()})});
  // Priority cycle
  document.querySelectorAll("[data-tpri]").forEach(function(el){el.addEventListener("click",function(e){e.stopPropagation();var idx=N(el.dataset.tpri);var cycle=["medel","hög","låg"];var cur=TASKS.items[idx].pri||"medel";TASKS.items[idx].pri=cycle[(cycle.indexOf(cur)+1)%3];taskSync();render()})});
  // Assign
  document.querySelectorAll("[data-tassign]").forEach(function(el){el.addEventListener("click",function(e){e.stopPropagation();var idx=N(el.dataset.tassign);var names=S.family.persons.map(function(p){return p.name});var cur=TASKS.items[idx].assignee||"";var next=names[(names.indexOf(cur)+1)%names.length]||names[0];TASKS.items[idx].assignee=(cur===next&&cur)?"":(next||"");taskSync();render()})});
  // Filter
  document.querySelectorAll("[data-tf]").forEach(function(el){el.addEventListener("click",function(){S.taskFilter=el.dataset.tf;render()})});
  // Shortcuts
  document.querySelectorAll("[data-goto]").forEach(function(el){el.addEventListener("click",function(){
    var target=el.dataset.goto;
    if(target==="shop"){S.tab="todo";SHOP.activeStore=0;EXP["td-shop"]=true;localStorage.setItem("exp",JSON.stringify(EXP));render()}
    else if(target==="shop-sys"){S.tab="todo";SHOP.activeStore=N(el.dataset.store)||1;EXP["td-shop"]=true;localStorage.setItem("exp",JSON.stringify(EXP));shopSync();render()}
    else if(target==="prospekt"){S.tab="prospekt";S.viewIdx=null;render()}
    setTimeout(updateCharts,100)})});
  // Clear done
  var clr=document.getElementById("clearTasks");if(clr)clr.addEventListener("click",function(){TASKS.items=TASKS.items.filter(function(t){return!t.done});taskSync();render()});
}

function rShopContent(){
  var store=SHOP.stores[SHOP.activeStore]||SHOP.stores[0];
  var items=SHOP.items||[];
  var pending=items.filter(function(it){return!it.done});
  var done=items.filter(function(it){return it.done});
  // Sort pending by store category order
  var catOrder={};(store.cats||[]).forEach(function(c,i){catOrder[c]=i});
  pending.sort(function(a,b){return(catOrder[a.cat]||99)-(catOrder[b.cat]||99)});
  // Frequent items from history
  var freq=Object.keys(SHOP.history||{}).map(function(k){return{name:k,count:SHOP.history[k].count||0,cat:SHOP.history[k].cat,price:SHOP.history[k].price}}).filter(function(f){return f.count>=2}).sort(function(a,b){return b.count-a.count}).slice(0,15);
  // Filter out items already in list
  var inList={};items.forEach(function(it){inList[it.name.toLowerCase()]=true});
  var suggestions=freq.filter(function(f){return!inList[f.name.toLowerCase()]});
  // Estimated total
  var estTotal=0;pending.forEach(function(it){estTotal+=N(it.price)||N((SHOP.history||{})[it.name]||{}).price||0});

function bindShop(){
  var inp=document.getElementById("shopInput");
  if(!inp)return;
  // Quick add
  function addItem(name){
    name=name.trim();if(!name)return;
    var cat=guessCat(name);
    var hist=(SHOP.history||{})[name]||{};
    SHOP.items.push({name:name,cat:hist.cat||cat,done:false,price:hist.price||0,backlog:false,added:Date.now()});
    // Update history
    if(!SHOP.history)SHOP.history={};if(!SHOP.history[name])SHOP.history[name]={count:0};
    SHOP.history[name].count=(SHOP.history[name].count||0)+1;
    SHOP.history[name].cat=hist.cat||cat;
    shopSync();render();
    setTimeout(function(){var i=document.getElementById("shopInput");if(i){i.focus();i.value=""}},50);
  }
  inp.addEventListener("keydown",function(e){if(e.key==="Enter"){addItem(inp.value);inp.value=""}});
  var addBtn=document.getElementById("shopAdd");if(addBtn)addBtn.addEventListener("click",function(){addItem(inp.value);inp.value=""});
  // Check/uncheck
  document.querySelectorAll("[data-check]").forEach(function(el){el.addEventListener("click",function(){
    var idx=N(el.dataset.check);SHOP.items[idx].done=!SHOP.items[idx].done;
    if(SHOP.items[idx].done)SHOP.items[idx].backlog=false;
    shopSync();render()})});
  // Delete
  document.querySelectorAll("[data-sdel]").forEach(function(el){el.addEventListener("click",function(e){e.stopPropagation();SHOP.items.splice(N(el.dataset.sdel),1);shopSync();render()})});
  // Missing → backlog
  document.querySelectorAll("[data-miss]").forEach(function(el){el.addEventListener("click",function(e){e.stopPropagation();SHOP.items[N(el.dataset.miss)].backlog=true;SHOP.items[N(el.dataset.miss)].done=true;shopSync();render()})});
  // Set price
  document.querySelectorAll("[data-setprice]").forEach(function(el){el.addEventListener("click",function(e){e.stopPropagation();var p=prompt("Pris (kr):");if(p!==null){var idx=N(el.dataset.setprice);SHOP.items[idx].price=N(p);if(!SHOP.history)SHOP.history={};if(SHOP.items[idx].name){if(!SHOP.history[SHOP.items[idx].name])SHOP.history[SHOP.items[idx].name]={};SHOP.history[SHOP.items[idx].name].price=N(p)}shopSync();render()}})});
  // Inventory
  var openInv=document.getElementById("openInv");if(openInv)openInv.addEventListener("click",function(){SHOP.mode="inv";render()});
  var closeInv=document.getElementById("closeInv");if(closeInv)closeInv.addEventListener("click",function(){SHOP.mode="list";render()});
  document.querySelectorAll("[data-inv]").forEach(function(el){el.addEventListener("click",function(){
    var name=el.dataset.inv;var exists=SHOP.items.some(function(it){return it.name.toLowerCase()===name.toLowerCase()&&!it.done});
    if(!exists)addItem(name);else{SHOP.items=SHOP.items.filter(function(it){return it.name.toLowerCase()!==name.toLowerCase()||it.done});shopSync();render()}})});
  // Clear done
  var clr=document.getElementById("clearDone");if(clr)clr.addEventListener("click",function(){SHOP.items=SHOP.items.filter(function(it){return!it.done||it.backlog});shopSync();render()});
  // Store select
  var ss2=document.getElementById("storeSelect");if(ss2)ss2.addEventListener("change",function(e){SHOP.activeStore=N(e.target.value);shopSync();render()});
  var addSt=document.getElementById("addStore");if(addSt)addSt.addEventListener("click",function(){var n=prompt("Butiksnamn:");if(!n)return;SHOP.stores.push({name:n,cats:SHOP.stores[0].cats.slice()});SHOP.activeStore=SHOP.stores.length-1;shopSync();render()});
  // Save actual total
  var saveTot=document.getElementById("saveTotal");if(saveTot)saveTot.addEventListener("click",function(){var v=N(document.getElementById("actualTotal").value);SHOP.actualTotal=v;
    // Train price estimates from actual
    if(v>0&&SHOP.items.length){var itemsWithPrice=SHOP.items.filter(function(it){return it.done&&it.price>0});var estSum=itemsWithPrice.reduce(function(s,it){return s+it.price},0);
    if(estSum>0){var ratio=v/estSum;itemsWithPrice.forEach(function(it){if(SHOP.history[it.name])SHOP.history[it.name].price=Math.round(it.price*ratio)})}}
    shopSync();toast("Slutpris sparat — priser uppdaterade")});
}

  var om=document.getElementById("offmarket");if(om)om.addEventListener("change",function(e){var ps=dc(S.prospects);ps[S.viewIdx].off_market=e.target.checked;ss({prospects:ps})});
  // Schabloner
  var asch=document.getElementById("autoschab");if(asch)asch.addEventListener("click",function(){var ps=dc(S.prospects),p=ps[S.viewIdx];if(!p)return;var dd=p.dd||{};var boa=N(dd.boarea)||150,bygg=N(dd.byggar)||2000,upv=(dd.uppvarmning||"").toLowerCase();var h=15;if(upv.indexOf("pump")>=0)h=10;else if(upv.indexOf("fjärr")>=0)h=12;else if(upv.indexOf("direkt")>=0)h=20;if(bygg<1990)h=Math.round(h*1.2);
    var count=0;
    p.drift.heat=Math.round(boa*h/12);p.drift._src_heat="est";count++;
    p.drift.el=Math.round(boa*3);p.drift._src_el="est";count++;
    p.drift.water=500;p.drift._src_water="est";count++;
    p.drift.waste=300;p.drift._src_waste="est";count++;
    p.drift.ins=Math.round(300+boa*1.5);p.drift._src_ins="est";count++;
    var tv=N(dd.taxvarde);p.drift.tax=tv>0?Math.round(Math.min(Math.round(tv*0.0075),10425)/12):869;p.drift._src_tax=tv>0?"auth":"est";count++;
    p.drift.garden=(N(dd.tomtarea)||0)>500?500:300;p.drift._src_garden="est";count++;
    ss({prospects:ps});
    toast(count+" driftposter beräknade från "+boa+"m² "+(upv||"okänd uppvärmning"));
  });
  // Reno plan
  var addReno=document.getElementById("add-reno");if(addReno)addReno.addEventListener("click",function(){var ps=dc(S.prospects);if(!ps[S.viewIdx].reno_plan)ps[S.viewIdx].reno_plan=[];ps[S.viewIdx].reno_plan.push({desc:"",year:new Date().getFullYear()});ss({prospects:ps})});
  // Comparables
  var addComp=document.getElementById("add-comp");if(addComp)addComp.addEventListener("click",function(){var ps=dc(S.prospects);if(!ps[S.viewIdx].comparables)ps[S.viewIdx].comparables=[];ps[S.viewIdx].comparables.push({addr:"",price:0,boarea:0,byggar:0});ss({prospects:ps})});
  document.querySelectorAll(".comp").forEach(function(el){el.addEventListener("change",function(e){var ps=dc(S.prospects);if(!ps[S.viewIdx].comparables)ps[S.viewIdx].comparables=[];var ci=N(e.target.dataset.ci);if(!ps[S.viewIdx].comparables[ci])ps[S.viewIdx].comparables[ci]={};ps[S.viewIdx].comparables[ci][e.target.dataset.cf]=e.target.type==="number"?N(e.target.value):e.target.value;ss({prospects:ps})})});
  document.querySelectorAll(".del-comp").forEach(function(el){el.addEventListener("click",function(){var ps=dc(S.prospects);ps[S.viewIdx].comparables.splice(N(el.dataset.ci),1);ss({prospects:ps})})});
  document.querySelectorAll(".reno-desc").forEach(function(el){el.addEventListener("change",function(e){var ps=dc(S.prospects);if(!ps[S.viewIdx].reno_plan)ps[S.viewIdx].reno_plan=[];ps[S.viewIdx].reno_plan[N(e.target.dataset.ri)].desc=e.target.value;ss({prospects:ps})})});
  document.querySelectorAll(".reno-year").forEach(function(el){el.addEventListener("change",function(e){var ps=dc(S.prospects);ps[S.viewIdx].reno_plan[N(e.target.dataset.ri)].year=N(e.target.value);ss({prospects:ps})})});
  document.querySelectorAll(".del-reno").forEach(function(el){el.addEventListener("click",function(){var ps=dc(S.prospects);ps[S.viewIdx].reno_plan.splice(N(el.dataset.ri),1);ss({prospects:ps})})});
  // Search data from worker
  var searchBtn=document.getElementById("searchData");
  if(searchBtn)searchBtn.addEventListener("click",async function(){
    var ps=dc(S.prospects),p=ps[S.viewIdx];if(!p||!p.addr){toast("Fyll i adress först");return}
    searchBtn.textContent="⏳ Söker...";searchBtn.disabled=true;
    try{
      var result=await fetchPropertyData(p.addr,p.urls);
      if(result&&result.data){
        var d=result.data,s=result.sources||{};
        if(!p.dd)p.dd={};
        var mapped=0,fields=[];
        function mp(dk,wk,src){var v=d[wk||dk];if(v!==null&&v!==undefined&&v!==""){p.dd[dk]=v;if(src)p.dd["_src_"+dk]=s[wk||dk]||src;mapped++;fields.push(dk)}}
        mp("kommun","kommun","auth");mp("omrade","omrade","auth");mp("postnummer","postnummer","auth");
        mp("hustyp","hustyp","auth");mp("byggar","byggar","listing");mp("boarea","boarea","listing");
        mp("biarea","biarea","listing");mp("tomtarea","tomtarea","auth");mp("rum","rum","listing");
        mp("energiklass","energiklass","listing");mp("uppvarmning","uppvarmning","listing");
        mp("taxvarde","taxvarde","auth");mp("fastighetsbeteckning","fastighetsbeteckning","auth");
        mp("byggnadsarea","byggnadsarea","auth");mp("vaningar","vaningar","auth");
        // Map estimated boarea to boarea if no real value exists
        if(d.boarea_est&&N(d.boarea_est)>=50&&!p.dd.boarea){p.dd.boarea=d.boarea_est;p.dd._src_boarea="est";mapped++;fields.push("boarea (est)")}
        // Map hustyp to DD hustyp field
        if(d.hustyp&&!p.dd.hustyp){p.dd.hustyp=d.hustyp;mapped++;fields.push("hustyp")}
        if(d.image)p.image=d.image;
        if(d.price&&N(d.price)>0&&!N(p.price))p.price=N(d.price);
        if(d.nearby)p._nearby=d.nearby;
        if(d.narmaste_skola){p.dd.narmaste_skola=d.narmaste_skola;mapped++}
        if(d.narmaste_hpl){p.dd.narmaste_hpl=d.narmaste_hpl;mapped++}
        // Build feedback message
        var src_list=(result.sources_checked||[]).join(", ");
        var missing=(result._missing||[]);
        var msg="<b>✓ "+mapped+" datapunkter</b> från "+src_list+"<br>"+
          (fields.length?"Hittade: "+fields.join(", ")+"<br>":"")+
          (missing.length?"<b>Saknas:</b> "+missing.join(", ")+" — fyll i manuellt eller fråga mäklaren":"Alla nyckelfält hittade!");
        p._searchResult={ok:mapped>3,msg:msg};
        ss({prospects:ps});
        toast("✓ "+mapped+" fält hittade");
        if(result._suggestions&&result._suggestions.length){setTimeout(function(){toast(result._suggestions[0])},3000)}
      }else{
        var ps2=dc(S.prospects);ps2[S.viewIdx]._searchResult={ok:false,msg:"Inga data hittades för denna adress. Kontrollera stavning."};
        ss({prospects:ps2});
        toast("Inga data hittades")
      }
    }catch(e){toast("Fel: "+e.message)}
    searchBtn.textContent="🔍 Sök";searchBtn.disabled=false;
  });
  // === AUTOCOMPLETE ===
  var addrIn=document.getElementById("addrInput"),acList=document.getElementById("acList");
  var acTimer=null;
  if(addrIn&&acList){
    addrIn.addEventListener("input",function(e){
      clearTimeout(acTimer);
      var q=e.target.value.trim();if(q.length<3){acList.classList.remove("show");return}
      acTimer=setTimeout(async function(){
        try{
          var resp=await fetch("https://photon.komoot.io/api/?q="+encodeURIComponent(q.replace(/,/g," "))+"&limit=8&lat=57.58&lon=11.94");
          var data=await resp.json();
          // Filter: only show features with a street name (skip district/city-level matches)
          var filtered=(data.features||[]).filter(function(f){return f.properties&&f.properties.street});
          if(!filtered.length)filtered=(data.features||[]).slice(0,5);// fallback
          filtered=filtered.slice(0,5);
          if(filtered.length){
            acList.innerHTML=filtered.map(function(f,i){
              var p=f.properties||{};
              var street=[p.street,p.housenumber].filter(Boolean).join(" ");
              var sub=[p.district,p.city,p.postcode].filter(Boolean).join(", ");
              var type=p.osm_value==="detached"?"Villa":p.osm_value==="semidetached_house"?"Radhus":p.type==="house"?"Hus":"";
              return '<div class="ac-item" data-aci="'+i+'" tabindex="0"><b>'+(street||p.name||q)+'</b><small>'+sub+(type?' · '+type:'')+'</small></div>'
            }).join('');
            acList.classList.add("show");
            acList._features=filtered;
          }else{acList.classList.remove("show")}
        }catch(e){acList.classList.remove("show")}
      },350);
    });
    addrIn.addEventListener("keydown",function(e){
      if(e.key==="Escape"){acList.classList.remove("show");return}
      if(e.key==="ArrowDown"||e.key==="Tab"){
        var first=acList.querySelector(".ac-item");
        if(first&&acList.classList.contains("show")){e.preventDefault();first.focus()}
      }
      if(e.key==="Enter"){var btn=document.getElementById("searchData");if(btn)btn.click();acList.classList.remove("show")}
    });
    // Keyboard nav in dropdown
    acList.addEventListener("keydown",function(e){
      if(e.key==="ArrowDown"){var next=e.target.nextElementSibling;if(next)next.focus();e.preventDefault()}
      if(e.key==="ArrowUp"){var prev=e.target.previousElementSibling;if(prev)prev.focus();else addrIn.focus();e.preventDefault()}
      if(e.key==="Enter"){e.target.click()}
      if(e.key==="Escape"){acList.classList.remove("show");addrIn.focus()}
    });
    function selectAcItem(feat){
      var pr=feat.properties||{};
      var street=[pr.street,pr.housenumber].filter(Boolean).join(" ");
      var district=pr.district||"";
      var city=pr.city||"";
      // Build full address: "Lovisa Ströms Väg 10, Billdal"
      var parts=[street];
      if(district&&district!==city)parts.push(district);
      var fullAddr=parts.join(", ");
      addrIn.value=fullAddr;
      acList.classList.remove("show");
      var ps=dc(S.prospects);
      ps[S.viewIdx].addr=fullAddr;
      if(!ps[S.viewIdx].name||ps[S.viewIdx].name.indexOf("Prospekt")===0)ps[S.viewIdx].name=street;
      S.prospects=ps;
      if(dbRef)dbRef.set({family:S.family,prospects:S.prospects});
      toast("Adress vald: "+fullAddr+" — söker data...");
      setTimeout(function(){var btn=document.getElementById("searchData");if(btn)btn.click()},300);
    }
    acList.addEventListener("click",function(e){
      var item=e.target.closest(".ac-item");if(!item)return;
      var idx=N(item.dataset.aci);
      var feat=acList._features&&acList._features[idx];
      if(feat)selectAcItem(feat);
    });
    document.addEventListener("click",function(e){if(!e.target.closest(".ac-wrap"))acList.classList.remove("show")});
    // Save addr on blur (when user types manually without autocomplete)
    addrIn.addEventListener("blur",function(){
      setTimeout(function(){
        var val=addrIn?addrIn.value:"";
        if(val&&S.prospects[S.viewIdx]&&val!==S.prospects[S.viewIdx].addr){
          var ps=dc(S.prospects);ps[S.viewIdx].addr=val;ss({prospects:ps})
        }
      },200);
    });
  }
}

// === CHARTS ===

  var tc=S.dark?"#9C9588":"#6B6358",gc=S.dark?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)",C={coral:"#C2532E",amber:"#D4890F",teal:"#1A8A65",purple:"#6B4DAA",blue:"#2E78B7"};
  // Hem & ekonomi charts
  if(S.tab==="bostad"){

        backgroundColor:[C.coral,C.amber,C.purple,C.blue,C.teal],borderWidth:2,borderColor:S.dark?"#1E1B17":"#fff"}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{legend:{position:"right",labels:{font:{size:9},color:tc,padding:4,boxWidth:10}}}}})}
    // 2. Per-person stapel
    var persEl=document.getElementById("personChart");
    if(persEl&&t.length>=2){S.charts.pers=new Chart(persEl,{type:"bar",data:{
      labels:f.persons.map(function(p){return p.name}),

        {label:"Gemensamt",data:t.map(function(tr){return tr.totalTransfer}),backgroundColor:C.coral},
        {label:"Egna",data:t.map(function(tr){return tr.pBud}),backgroundColor:C.blue},
        {label:"Kvar",data:t.map(function(tr){return Math.max(0,tr.surplus)}),backgroundColor:C.amber}
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:9},color:tc,boxWidth:10}}},scales:{x:{grid:{display:false},ticks:{font:{size:10},color:tc}},y:{grid:{color:gc},ticks:{font:{size:9},color:tc,callback:function(v){return Math.round(v/1000)+"k"}},border:{display:false}}}}})}
    // 3. Flow bar (horisontell stacked — inkomst vs utgifter)
    var flowEl=document.getElementById("flowChart");
    if(flowEl){S.charts.flow=new Chart(flowEl,{type:"bar",data:{
      labels:[""],
      datasets:[
        {label:"Boende "+fSEK(c.housing),data:[c.housing],backgroundColor:C.coral},
        {label:"ICA "+fSEK(c.icaTotal),data:[c.icaTotal],backgroundColor:C.amber},
        {label:"Hushåll "+fSEK(c.hushallTotal),data:[c.hushallTotal],backgroundColor:C.purple},
        {label:"Personligt "+fSEK(pBudTotal),data:[pBudTotal],backgroundColor:C.blue},
        {label:"Kvar "+fSEK(Math.max(0,c.surplus)),data:[Math.max(0,c.surplus)],backgroundColor:C.teal}
      ]},options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:true}},scales:{x:{stacked:true,max:c.disp,grid:{display:false},ticks:{font:{size:9},color:tc,callback:function(v){return Math.round(v/1000)+"k"}}},y:{stacked:true,display:false}}}})
    }
  }
  // Dashboard donut
  var dashDonut=document.getElementById("dashDonut");
  if(dashDonut&&S.tab==="dash"){var cf=calcFamily(S.family);var pBT=cf.pBuds.reduce(function(s,v){return s+v},0);
    S.charts.dashDonut=new Chart(dashDonut,{type:"doughnut",data:{
      labels:["Boende","ICA/mat","Hushåll","Personligt","Kvar"],
      datasets:[{data:[cf.housing,cf.icaTotal,cf.hushallTotal,pBT,Math.max(0,cf.surplus)],
        backgroundColor:[C.coral,C.amber,C.purple,C.blue,C.teal],borderWidth:2,borderColor:S.dark?"#1E1B17":"#fff"}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:"55%",animation:{animateRotate:true,duration:1200},plugins:{legend:{position:"right",labels:{font:{size:9},color:tc,padding:4,boxWidth:10}}}}})
  }
  if(S.tab!=="dash"||!S.prospects.length)return;
  var f=S.family,c=calcFamily(f),rs=S.prospects.map(function(p){return calcP(f,p)}),currH=c.housing;
  var tc=S.dark?"#9C9588":"#6B6358",gc=S.dark?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)",C={coral:"#C2532E",amber:"#D4890F",teal:"#1A8A65",purple:"#6B4DAA",blue:"#2E78B7"};
  var bEl=document.getElementById("dBar");
  if(bEl){var labels=[(f.curr_addr||"Nuv.")];rs.forEach(function(r){labels.push((r.name||"?").slice(0,12))});
    S.charts.bar=new Chart(bEl,{type:"bar",data:{labels:labels,datasets:[{label:"Ränta",data:[N(f.curr_int)].concat(rs.map(function(r){return r.intMonth})),backgroundColor:C.coral},{label:"Drift",data:[N(f.curr_brf)+N(f.curr_garage)].concat(rs.map(function(r){return r.drift})),backgroundColor:C.teal},{label:"Amort.",data:[N(f.curr_amort)].concat(rs.map(function(r){return r.amortMonth})),backgroundColor:C.amber,borderRadius:{topLeft:3,topRight:3}}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:9},color:tc}}},scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:9},color:tc}},y:{stacked:true,grid:{color:gc},ticks:{font:{size:9},color:tc,callback:function(v){return Math.round(v/1000)+"k"}},border:{display:false}}}}})}

  if(sEl){var rates=[0.02,0.025,0.03,0.035,0.04,0.05,0.06,0.07],cols=[C.coral,C.teal,C.blue,C.purple,C.amber];
    S.charts.str=new Chart(sEl,{type:"line",data:{labels:rates.map(function(r){return(r*100).toFixed(1)+"%"}),datasets:rs.map(function(r,j){return{label:(r.name||"?").slice(0,12),data:rates.map(function(rate){return Math.round(calcSR(f,S.prospects[j],rate))}),borderColor:cols[j%5],backgroundColor:cols[j%5]+"18",fill:true,tension:0.3,pointRadius:2,borderWidth:2}})},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:9},color:tc}}},scales:{x:{grid:{display:false},ticks:{font:{size:9},color:tc}},y:{grid:{color:gc},ticks:{font:{size:9},color:tc,callback:function(v){var a=Math.abs(v);return(v<0?"−":"")+(a>=1000?Math.round(a/1000)+"k":a)}},border:{display:false}}}}})}
}

var saved=localStorage.getItem("hid");if(saved){S.hid=saved;connect(saved)}else render();
