var FC={apiKey:"AIzaSyDmQKsqqai1DKB2sJ4F0hIbX1EbknLNpA4",authDomain:"hus-och-budget.firebaseapp.com",databaseURL:"https://hus-och-budget-default-rtdb.europe-west1.firebasedatabase.app",projectId:"hus-och-budget",storageBucket:"hus-och-budget.firebasestorage.app",messagingSenderId:"1019610713349",appId:"1:1019610713349:web:26c9ec60dfd8009c1b3b6c"};
firebase.initializeApp(FC);var db=firebase.database();

// === TAX ENGINE ===
var PBB=58800;
function N(v){var n=Number(v);return isNaN(n)?0:n}
function grundavdrag(i){if(i<=0)return 0;if(i<=.99*PBB)return Math.round(.423*PBB);if(i<=2.72*PBB)return Math.round(.423*PBB+.2*(i-.99*PBB));if(i<=3.41*PBB)return Math.round(.77*PBB);if(i<=8.08*PBB)return Math.round(.77*PBB-.1*(i-3.41*PBB));return Math.max(Math.round(.293*PBB),17400)}
function jsaCalc(i,k){if(i<=0)return 0;if(i<=.91*PBB)return Math.round(k*i);if(i<=3.24*PBB)return Math.round(k*.91*PBB+.332*(i-.91*PBB));if(i<=8.08*PBB)return Math.round(k*.91*PBB+.332*(3.24-.91)*PBB);if(i<=13.54*PBB)return Math.round(Math.max(0,k*.91*PBB+.332*(3.24-.91)*PBB-.03*(i-8.08*PBB)));return Math.round(Math.max(0,k*.91*PBB+.332*(3.24-.91)*PBB-.03*(13.54-8.08)*PBB))}
function ptax(gm,by,cfg,intDed){
  var b=N(gm)*12+N(by),g=grundavdrag(b),be=Math.max(0,b-g),sg=643000;
  var ks=Math.round(be*N(cfg.ks)),ss=be>sg?Math.round((be-sg)*.2):0;
  var pa=Math.round(Math.min(b,590700)*.07),ka=cfg.ch?Math.round(be*N(cfg.ka)):0;
  var bg=Math.round(be*.00293),ps=Math.min(Math.round(be*.01),1349);
  var tot=ks+ss+pa+ka+bg+ps;
  var rk=0,id=N(intDed);if(id>0)rk=id<=1e5?Math.round(id*.3):Math.round(1e5*.3+(id-1e5)*.21);
  var rd=jsaCalc(b,N(cfg.ks))+pa+1500+rk,sl=Math.max(0,tot-rd);
  var mg=b>(sg+g)?N(cfg.ks)+.2:N(cfg.ks);
  return{n:Math.round((b-sl)/12),br:Math.round(b/12),sl:sl,ss:ss,ka:ka,mg:Math.round(mg*1e3)/1e3}
}
function barnbidrag(nc){var t={0:0,1:1250,2:2650,3:4480,4:6740,5:9240,6:11740};nc=N(nc);if(nc<=0)return 0;if(nc in t)return t[nc];return 11740+(nc-6)*2500}

// === PROSPECT CALC ===
function calcP(f,p){
  var aptSale=N(f.curr_value)||10000000,currMtg=N(f.curr_mortgage)||5416460;
  var bba=barnbidrag(f.children);
  var sc=aptSale-aptSale*0.02-currMtg;
  var rep=Math.min(N(p.parent_repay),N(p.parent_loan));
  var eq=sc-rep,ta=N(p.price)+N(p.reno),nm=Math.max(0,ta-eq);
  var er=N(f.rate)||0.022;if(er<=0)er=0.022;
  var im=Math.round(nm*er/12),yi=nm*er;
  var gi=f.persons.reduce(function(s,pe){return s+N(pe.gm)*12+N(pe.by)},0);
  var ltv=N(p.price)>0?nm/N(p.price):0;
  var dti=gi>0?Math.round((nm+N(p.parent_loan)-rep)/gi*10)/10:0;
  var ar=0;if(ltv>0.7)ar=0.02;else if(ltv>0.5)ar=0.01;
  var am=Math.round(nm*ar/12);
  var d=p.drift||{},dt=0;for(var k in d)dt+=N(d[k]);
  var op=im+dt,th=op+am;
  var fks=N(f.ks)||0.326,fka=N(f.ka)||0.0085;
  var taxes=f.persons.map(function(pe,i){var sh=pe.intShare!==undefined?N(pe.intShare):(i===0?1:0);return ptax(pe.gm,pe.by,{ks:fks,ka:fka,ch:pe.church},yi*sh)});
  var fd=taxes.reduce(function(s,t){return s+t.n},0)+bba;
  var bu=calcBudgetTotal(f);
  var lf=Math.round(N(p.price)*0.015)+825,npb=Math.max(0,nm-N(p.pantbrev)),pb=npb>0?Math.round(npb*0.02)+375:0;
  var surplus=fd-th-bu;
  // Risk
  var risks=[],rs=0;
  if(ltv>0.85){risks.push({t:"Hög belåningsgrad",d:(ltv*100).toFixed(0)+"% — svårt att få lån",l:"high"});rs+=3}
  else if(ltv>0.7){risks.push({t:"LTV >70%",d:(ltv*100).toFixed(0)+"% — 2% amorteringskrav",l:"med"});rs+=1}
  if(dti>4.5){risks.push({t:"Hög skuldkvot",d:dti+"x",l:"high"});rs+=2}
  else if(dti>3.5){risks.push({t:"Förhöjd skuldkvot",d:dti+"x",l:"med"});rs+=1}
  var dd=p.dd||{},yr=new Date().getFullYear();
  if(N(dd.byggar)&&N(dd.byggar)<1980){risks.push({t:"Äldre hus",d:"Byggt "+dd.byggar,l:"med"});rs+=1}
  if(dd.energiklass&&"EFG".indexOf(dd.energiklass)>=0){risks.push({t:"Energiklass "+dd.energiklass,d:"Höga driftkostnader",l:"med"});rs+=1}
  if(N(dd.tak_ar)&&(yr-N(dd.tak_ar))>25){risks.push({t:"Tak "+(yr-N(dd.tak_ar))+" år",d:"Livslängd 30-40 år",l:"med"});rs+=1}
  if(N(dd.vp_ar)&&(yr-N(dd.vp_ar))>15){risks.push({t:"VP "+(yr-N(dd.vp_ar))+" år",d:"Byte 80-150k",l:"med"});rs+=1}
  if(surplus<0){risks.push({t:"Negativt överskott",d:fSEK(surplus)+"/mån",l:"high"});rs+=3}
  else if(surplus<5000){risks.push({t:"Tight marginal",d:fSEK(surplus)+"/mån kvar",l:"med"});rs+=1}
  var s5=calcSR(f,p,0.05),s7=calcSR(f,p,0.07);
  if(s5<0){risks.push({t:"Klarar ej 5% ränta",d:fSEK(s5)+"/mån",l:"high"});rs+=2}
  if(!risks.length)risks.push({t:"Inga större risker",d:"God marginal",l:"low"});
  var rl=rs>=4?"high":rs>=2?"med":"low";
  var missing=[];
  if(!dd.byggar)missing.push("Byggår");if(!dd.energiklass)missing.push("Energiklass");if(!dd.boarea)missing.push("Boarea");if(!dd.tomtarea)missing.push("Tomtarea");if(!dd.uppvarmning)missing.push("Uppvärmning");if(!dd.taxvarde)missing.push("Taxeringsvärde");
  return{name:p.name,price:N(p.price),reno:N(p.reno),mortgage:nm,rate:er,intMonth:im,amortRate:ar,amortMonth:am,drift:dt,opCost:op,totalHousing:th,disp:fd,bb:bba,ltv:ltv,dti:dti,surplus:surplus,lagfart:lf,pantbrev:pb,txCost:lf+pb,equity:eq,risks:risks,riskLevel:rl,missing:missing,budget:bu,s5:s5,s7:s7,taxes:taxes,gross:gi}
}
function calcSR(f,p,rate){
  var aptSale=N(f.curr_value)||10000000,currMtg=N(f.curr_mortgage)||5416460;
  var bba=barnbidrag(f.children),sc=aptSale-aptSale*0.02-currMtg;
  var rep=Math.min(N(p.parent_repay),N(p.parent_loan)),eq=sc-rep;
  var nm=Math.max(0,N(p.price)+N(p.reno)-eq),im=Math.round(nm*rate/12);
  var ltv=N(p.price)>0?nm/N(p.price):0,ar=0;if(ltv>0.7)ar=0.02;else if(ltv>0.5)ar=0.01;
  var am=Math.round(nm*ar/12),d=p.drift||{},dt=0;for(var k in d)dt+=N(d[k]);
  var fks=N(f.ks)||0.326,fka=N(f.ka)||0.0085;
  var taxes=f.persons.map(function(pe,i){var sh=pe.intShare!==undefined?N(pe.intShare):(i===0?1:0);return ptax(pe.gm,pe.by,{ks:fks,ka:fka,ch:pe.church},nm*rate*sh)});
  var fd=taxes.reduce(function(s,t){return s+t.n},0)+bba;
  return fd-(im+dt+am)-calcBudgetTotal(f);
}
function calcBudgetTotal(f){
  var t=0;
  if(f.budget_shared){for(var i=0;i<f.budget_shared.length;i++)t+=N(f.budget_shared[i].amount)}
  f.persons.forEach(function(p){if(p.personal_budget){for(var i=0;i<p.personal_budget.length;i++)t+=N(p.personal_budget[i].amount)}});
  return t;
}
function calcPersonBudget(p){var t=0;if(p.personal_budget){for(var i=0;i<p.personal_budget.length;i++)t+=N(p.personal_budget[i].amount)}return t}

// === FORMAT ===
function fSEK(v){v=N(v);return Math.abs(v)>=1e6?(v/1e6).toFixed(2)+" mkr":Math.round(v).toLocaleString("sv-SE")+" kr"}
function fN(v){return Math.round(N(v)).toLocaleString("sv-SE")}
function fP(v,d){return(N(v)*100).toFixed(d||1)+"%"}

var S={screen:"login",dark:false,hid:"",family:JSON.parse(JSON.stringify(FDEF)),prospects:[],tab:"dash",viewIdx:null,charts:{}};

function ss(p){for(var k in p)S[k]=p[k];render();if(S.screen==="app"&&dbRef&&!skipSync)dbRef.set({family:S.family,prospects:S.prospects})}

// === FIREBASE ===
function connect(id){
  dbRef=db.ref("households/"+id);
  dbRef.on("value",function(snap){
    var d=snap.val();if(!d)return;skipSync=true;
    if(d.family){
      var fam=JSON.parse(JSON.stringify(FDEF));
      for(var k in d.family){if(k!=="persons"&&k!=="budget_shared")fam[k]=d.family[k]}
      if(d.family.persons)fam.persons=d.family.persons;
      if(d.family.budget_shared)fam.budget_shared=d.family.budget_shared;
      // Migrate old budget format
      if(d.family.budget&&!d.family.budget_shared){
        var items=[];for(var bk in d.family.budget){items.push({name:bk,amount:N(d.family.budget[bk])})}
        fam.budget_shared=items;
      }
      S.family=fam;
    }
    if(d.prospects)S.prospects=d.prospects;
    S.screen="app";skipSync=false;render();setTimeout(updateCharts,80);
  });
  dbRef.once("value",function(snap){if(!snap.val())dbRef.set({family:S.family,prospects:[]})});
  S.screen="app";localStorage.setItem("hid",id);render();
}

// === COMPUTED HELPERS ===
function calcFamily(f){
  var taxes=f.persons.map(function(p){return ptax(p.gm,p.by,{ks:N(f.ks)||0.326,ka:N(f.ka)||0.0085,ch:p.church})});
  var bba=barnbidrag(f.children);
  var netto=taxes.reduce(function(s,t){return s+t.n},0);
  var disp=netto+bba;
  var sharedBudget=0;if(f.budget_shared){for(var i=0;i<f.budget_shared.length;i++)sharedBudget+=N(f.budget_shared[i].amount)}
  var personalBudgets=f.persons.map(function(p){return calcPersonBudget(p)});
  var totalBudget=sharedBudget+personalBudgets.reduce(function(s,v){return s+v},0);
  var housing=N(f.curr_int)+N(f.curr_amort)+N(f.curr_brf)+N(f.curr_garage);
  var surplus=disp-totalBudget-housing;
  return{taxes:taxes,bba:bba,netto:netto,disp:disp,sharedBudget:sharedBudget,personalBudgets:personalBudgets,totalBudget:totalBudget,housing:housing,surplus:surplus};
}

  '<div class="fi"><label>Rum</label><input type="number" value="'+(p.dd.rum||"")+'" data-dk="rum" class="dd"></div></div>'+
  '<div class="fg fg3 mt6">'+
  '<div class="fi"><label>Energiklass</label><input value="'+(p.dd.energiklass||"")+'" data-dk="energiklass" class="dd" placeholder="A-G"></div>'+
  '<div class="fi"><label>Uppvärmning</label><input value="'+(p.dd.uppvarmning||"")+'" data-dk="uppvarmning" class="dd"></div>'+
  '<div class="fi"><label>Taxeringsvärde</label><input type="number" value="'+(p.dd.taxvarde||"")+'" data-dk="taxvarde" class="dd"></div></div>'+
  '<div style="font-size:10px;font-weight:600;color:var(--amber);margin:8px 0 4px">Underhåll (senaste åtgärd, årtal)</div>'+
  '<div class="fg fg4"><div class="fi"><label>Tak</label><input type="number" value="'+(p.dd.tak_ar||"")+'" data-dk="tak_ar" class="dd"></div><div class="fi"><label>Fasad</label><input type="number" value="'+(p.dd.fasad_ar||"")+'" data-dk="fasad_ar" class="dd"></div><div class="fi"><label>VP</label><input type="number" value="'+(p.dd.vp_ar||"")+'" data-dk="vp_ar" class="dd"></div><div class="fi"><label>Badrum</label><input type="number" value="'+(p.dd.badrum_ar||"")+'" data-dk="badrum_ar" class="dd"></div></div>'+
  '<div class="fi mt6"><label>Anteckningar</label><textarea data-dk="visning_notes" class="dd">'+(p.dd.visning_notes||"")+'</textarea></div>'+
  '<div class="fi mt6"><label>Frågor till mäklaren</label><textarea data-dk="maklare_fragor" class="dd">'+(p.dd.maklare_fragor||"")+'</textarea></div>'+
  (r.missing.length?'<div class="quest mt6">📋 Saknar: '+r.missing.join(", ")+'</div>':'')+
  '</div></div>'+

  // Risk
  '<div class="card"><div class="card-b">'+
  '<div style="font-size:11px;font-weight:600">⚠️ Risk — <span class="badge '+(r.riskLevel==="low"?"b-green":r.riskLevel==="med"?"b-amber":"b-red")+'">'+(r.riskLevel==="low"?"Låg":r.riskLevel==="med"?"Medel":"Hög")+'</span></div>'+
  r.risks.map(function(ri){return '<div class="risk-card '+ri.l+'"><b>'+ri.t+'</b><br>'+ri.d+'</div>'}).join('')+
  '</div></div>'+

  // Checklist
  '<div class="card"><div class="card-b">'+
  '<div style="font-size:11px;font-weight:600;margin-bottom:6px">✅ Checklista</div>'+
  '<div class="fg fg3">'+Object.keys(CHECK_L).map(function(k){return '<label style="font-size:10px;display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" '+(cl[k]?"checked":"")+' data-ck="'+k+'" class="ckb" style="accent-color:var(--teal)">'+CHECK_L[k]+'</label>'}).join('')+'</div>'+
  '</div></div>'+

  // Drift
  '<div class="card"><div class="card-b">'+
  '<div style="font-size:11px;font-weight:600;margin-bottom:6px">Driftkostnader (kr/mån)</div>'+
  '<div class="fg fg4">'+Object.keys(DRIFT_L).map(function(k){return '<div class="fi"><label>'+DRIFT_L[k]+'</label><input type="number" value="'+N(p.drift[k])+'" data-drk="'+k+'" class="dri"></div>'}).join('')+'</div>'+
  '</div></div>';
}

// === COMPARE ===
function rCompare(f,c){
  if(!S.prospects.length)return '<div class="empty"><p style="font-size:12px">Lägg till prospekt först</p></div>';
  var rs=S.prospects.map(function(p){return calcP(f,p)});
  var currH=c.housing;
  var rows=[
    ["Huspris",function(r){return fSEK(r.price)},null,"—"],
    ["Nytt bolån",function(r){return fSEK(r.mortgage)},null,fSEK(N(f.curr_mortgage))],
    ["LTV",function(r){return fP(r.ltv)},function(r){return r.ltv>0.85?"r":r.ltv>0.7?"a":""},"—"],
    ["Skuldkvot",function(r){return r.dti+"x"},function(r){return r.dti>4.5?"r":r.dti>3.5?"a":""},"—"],
    ["Ränta/mån",function(r){return fN(r.intMonth)+" kr"},null,fN(N(f.curr_int))+" kr"],
    ["Amortering/mån",function(r){return fN(r.amortMonth)+" kr"},null,fN(N(f.curr_amort))+" kr"],
    ["Drift/mån",function(r){return fN(r.drift)+" kr"},null,fN(N(f.curr_brf)+N(f.curr_garage))+" kr"],
    ["Boende/mån",function(r){return fN(r.totalHousing)+" kr"},null,fN(currH)+" kr"],
    ["vs nuvarande",function(r){var d=r.totalHousing-currH;return(d>=0?"+":"")+fN(d)+" kr"},function(r){return(r.totalHousing-currH)<=0?"g":"r"},"—"],
    ["Överskott",function(r){return(r.surplus>=0?"+":"")+fN(r.surplus)+" kr"},function(r){return r.surplus>=0?"g":"r"},(c.surplus>=0?"+":"")+fN(c.surplus)+" kr"],
    ["Stresstest 5%",function(r){return(r.s5>=0?"+":"")+fN(r.s5)+" kr"},function(r){return r.s5>=0?"g":"r"},"—"],
    ["Stresstest 7%",function(r){return(r.s7>=0?"+":"")+fN(r.s7)+" kr"},function(r){return r.s7>=0?"g":"r"},"—"],
    ["Risk",function(r){return r.riskLevel==="low"?"Låg":r.riskLevel==="med"?"Medel":"Hög"},function(r){return r.riskLevel==="low"?"g":r.riskLevel==="med"?"a":"r"},"—"]
  ];
  return '<div class="card" style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">'+
  '<thead><tr><th style="text-align:left;padding:8px;font-size:9px;text-transform:uppercase;color:var(--fg2);border-bottom:1px solid var(--border)">Nyckeltal</th>'+
  '<th style="text-align:right;padding:8px;font-size:9px;text-transform:uppercase;color:var(--teal);border-bottom:1px solid var(--border)">'+(f.curr_addr||"Nuvarande")+'</th>'+
  rs.map(function(r){return '<th style="text-align:right;padding:8px;font-size:9px;text-transform:uppercase;color:var(--fg2);border-bottom:1px solid var(--border)">'+r.name+'</th>'}).join('')+'</tr></thead>'+
  '<tbody>'+rows.map(function(row){
    var label=row[0],fn=row[1],cfn=row[2],currVal=row[3];
    return '<tr><td style="padding:5px 8px;border-bottom:1px solid var(--bg2);color:var(--fg2)">'+label+'</td>'+
    '<td style="padding:5px 8px;border-bottom:1px solid var(--bg2);text-align:right;font-family:var(--m);color:var(--teal)">'+currVal+'</td>'+
    rs.map(function(r){var cl=cfn?cfn(r):"";var st=cl==="g"?"color:var(--teal)":cl==="r"?"color:var(--rose)":cl==="a"?"color:var(--amber)":"";return '<td style="padding:5px 8px;border-bottom:1px solid var(--bg2);text-align:right;font-family:var(--m);'+st+'">'+fn(r)+'</td>'}).join('')+'</tr>'
  }).join('')+'</tbody></table></div>';
}

// === EVENTS ===
function bindGlobal(){
  document.getElementById("td").addEventListener("click",function(){S.dark=!S.dark;render()});
  document.getElementById("lo").addEventListener("click",function(){localStorage.removeItem("hid");if(dbRef)dbRef.off();dbRef=null;S.screen="login";S.hid="";render()});
  document.querySelectorAll(".tab").forEach(function(t){t.addEventListener("click",function(){S.viewIdx=null;S.tab=t.dataset.t;render();setTimeout(updateCharts,60)})});
  bindTab();
}
function bindTab(){
  // Bostad inputs
  var bf=function(id,k,parse){var el=document.getElementById(id);if(el)el.addEventListener("change",function(e){var v=parse?parse(e.target.value):e.target.value;var fam=dc(S.family);fam[k]=v;ss({family:fam})})};
  bf("ca","curr_addr");bf("cv","curr_value",N);bf("cm","curr_mortgage",N);bf("ci","curr_int",N);bf("cam","curr_amort",N);bf("cb","curr_brf",N);bf("cg","curr_garage",N);
  bf("cr","rate",function(v){return Math.max(0.1,N(v))/100});
  var crs=document.getElementById("crs"),crn=document.getElementById("crn");
  if(crs)crs.addEventListener("input",function(e){var fam=dc(S.family);fam.rate=N(e.target.value)/100;ss({family:fam})});
  if(crn)crn.addEventListener("change",function(e){var fam=dc(S.family);fam.rate=Math.max(0.1,N(e.target.value))/100;ss({family:fam})});
  var cch=document.getElementById("cch"),cchn=document.getElementById("cchn");
  if(cch)cch.addEventListener("input",function(e){var fam=dc(S.family);fam.children=N(e.target.value);ss({family:fam})});
  if(cchn)cchn.addEventListener("change",function(e){var fam=dc(S.family);fam.children=N(e.target.value);ss({family:fam})});
  // Person inputs
  document.querySelectorAll(".pi").forEach(function(el){el.addEventListener("change",function(e){var fam=dc(S.family);fam.persons[N(e.target.dataset.pi)][e.target.dataset.pf]=N(e.target.value);ss({family:fam})})});
  // Shared budget
  document.querySelectorAll(".si").forEach(function(el){el.addEventListener("change",function(e){var fam=dc(S.family);fam.budget_shared[N(e.target.dataset.si)].amount=N(e.target.value);ss({family:fam})})});
  var addShared=document.getElementById("add-shared");
  if(addShared)addShared.addEventListener("click",function(){var fam=dc(S.family);var name=prompt("Namn på budgetpost:");if(!name)return;fam.budget_shared.push({name:name,amount:0});ss({family:fam})});
  // Personal budget
  document.querySelectorAll(".pbi").forEach(function(el){el.addEventListener("change",function(e){var fam=dc(S.family);fam.persons[N(e.target.dataset.pi)].personal_budget[N(e.target.dataset.bi)].amount=N(e.target.value);ss({family:fam})})});
  document.querySelectorAll(".add-personal").forEach(function(el){el.addEventListener("click",function(){var pi=N(el.dataset.pi);var fam=dc(S.family);var name=prompt("Namn på budgetpost:");if(!name)return;if(!fam.persons[pi].personal_budget)fam.persons[pi].personal_budget=[];fam.persons[pi].personal_budget.push({name:name,amount:0});ss({family:fam})})});
  // New prospect
  var np=document.getElementById("np");if(np)np.addEventListener("click",function(){var p=dc(PDEF);p.name="Prospekt "+(S.prospects.length+1);var ps=dc(S.prospects);ps.push(p);ss({prospects:ps,viewIdx:ps.length-1})});
  // View prospect
  document.querySelectorAll("[data-vi]").forEach(function(el){el.addEventListener("click",function(){S.viewIdx=N(el.dataset.vi);render()})});
  // Prospect detail
  var backp=document.getElementById("backp");if(backp)backp.addEventListener("click",function(){S.viewIdx=null;render()});
  var delp=document.getElementById("delp");if(delp)delp.addEventListener("click",function(){if(!confirm("Radera?"))return;var ps=dc(S.prospects);ps.splice(S.viewIdx,1);ss({prospects:ps,viewIdx:null})});
  var psel=document.getElementById("ps");if(psel)psel.addEventListener("change",function(e){var ps=dc(S.prospects);ps[S.viewIdx].status=e.target.value;ss({prospects:ps})});
  document.querySelectorAll(".pp").forEach(function(el){el.addEventListener("change",function(e){var ps=dc(S.prospects);ps[S.viewIdx][e.target.dataset.pk]=e.target.value;ss({prospects:ps})})});
  // Sliders + number inputs for prospect
  document.querySelectorAll(".psl").forEach(function(el){el.addEventListener("input",function(e){var ps=dc(S.prospects);ps[S.viewIdx][e.target.dataset.sk]=N(e.target.value);ss({prospects:ps})})});
  document.querySelectorAll(".pnm").forEach(function(el){el.addEventListener("change",function(e){var ps=dc(S.prospects);ps[S.viewIdx][e.target.dataset.sk]=N(e.target.value);ss({prospects:ps})})});
  // DD
  document.querySelectorAll(".dd").forEach(function(el){el.addEventListener("change",function(e){var ps=dc(S.prospects);var v=e.target.type==="number"?(N(e.target.value)||null):e.target.value;if(!ps[S.viewIdx].dd)ps[S.viewIdx].dd={};ps[S.viewIdx].dd[e.target.dataset.dk]=v;ss({prospects:ps})})});
  // Drift
  document.querySelectorAll(".dri").forEach(function(el){el.addEventListener("change",function(e){var ps=dc(S.prospects);ps[S.viewIdx].drift[e.target.dataset.drk]=N(e.target.value);ss({prospects:ps})})});
  // Checklist
  document.querySelectorAll(".ckb").forEach(function(el){el.addEventListener("change",function(e){var ps=dc(S.prospects);if(!ps[S.viewIdx].checklist)ps[S.viewIdx].checklist={};ps[S.viewIdx].checklist[e.target.dataset.ck]=e.target.checked;ss({prospects:ps})})});
  // Auto schabloner
  var asch=document.getElementById("autoschab");
  if(asch)asch.addEventListener("click",function(){
    var ps=dc(S.prospects);var p=ps[S.viewIdx];if(!p)return;var dd=p.dd||{};
    var boa=N(dd.boarea)||150,bygg=N(dd.byggar)||2000,upv=(dd.uppvarmning||"").toLowerCase();
    var h=15;if(upv.indexOf("pump")>=0)h=10;else if(upv.indexOf("fjärr")>=0)h=12;else if(upv.indexOf("direkt")>=0)h=20;
    if(bygg<1990)h=Math.round(h*1.2);
    p.drift.heat=Math.round(boa*h/12);p.drift.el=Math.round(boa*3);p.drift.water=500;p.drift.waste=300;
    p.drift.ins=Math.round(300+boa*1.5);
    var tv=N(dd.taxvarde);p.drift.tax=tv>0?Math.round(Math.min(Math.round(tv*0.0075),10425)/12):869;
    p.drift.garden=(N(dd.tomtarea)||0)>500?500:300;
    ss({prospects:ps});
  });
}

// === CHARTS ===
function updateCharts(){
  for(var k in S.charts){try{S.charts[k].destroy()}catch(e){}}S.charts={};
  if(S.tab!=="dash"||!S.prospects.length)return;
  var f=S.family,c=calcFamily(f);var currH=c.housing;
  var rs=S.prospects.map(function(p){return calcP(f,p)});
  var tc=S.dark?"#9C9588":"#6B6358",gc=S.dark?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)";
  var C={coral:"#C2532E",amber:"#D4890F",teal:"#1A8A65",purple:"#6B4DAA",blue:"#2E78B7"};
  var barEl=document.getElementById("dashBar");
  if(barEl){
    var labels=[(f.curr_addr||"Nuvarande")];rs.forEach(function(r){labels.push(r.name||"?")});
    S.charts.bar=new Chart(barEl,{type:"bar",data:{labels:labels,datasets:[
      {label:"Ränta",data:[N(f.curr_int)].concat(rs.map(function(r){return r.intMonth})),backgroundColor:C.coral},
      {label:"Drift",data:[N(f.curr_brf)+N(f.curr_garage)].concat(rs.map(function(r){return r.drift})),backgroundColor:C.teal},
      {label:"Amortering",data:[N(f.curr_amort)].concat(rs.map(function(r){return r.amortMonth})),backgroundColor:C.amber,borderRadius:{topLeft:3,topRight:3}}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:9},color:tc}}},scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:9},color:tc}},y:{stacked:true,grid:{color:gc},ticks:{font:{size:9},color:tc,callback:function(v){return Math.round(v/1000)+"k"}},border:{display:false}}}}});
  }
  var stEl=document.getElementById("dashStress");
  if(stEl){
    var rates=[0.02,0.025,0.03,0.035,0.04,0.05,0.06,0.07];
    var cols=[C.coral,C.teal,C.blue,C.purple,C.amber];
    var ds=rs.map(function(r,j){return{label:r.name||"?",data:rates.map(function(rate){return Math.round(calcSR(f,S.prospects[j],rate))}),borderColor:cols[j%5],backgroundColor:cols[j%5]+"18",fill:true,tension:0.3,pointRadius:2,borderWidth:2}});
    S.charts.stress=new Chart(stEl,{type:"line",data:{labels:rates.map(function(r){return(r*100).toFixed(1)+"%"}),datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:9},color:tc}}},scales:{x:{grid:{display:false},ticks:{font:{size:9},color:tc}},y:{grid:{color:gc},ticks:{font:{size:9},color:tc,callback:function(v){var a=Math.abs(v);return(v<0?"−":"")+(a>=1000?Math.round(a/1000)+"k":a)}},border:{display:false}}}}});
  }
}

if(saved){S.hid=saved;connect(saved)}else render();
</script>
</body>
